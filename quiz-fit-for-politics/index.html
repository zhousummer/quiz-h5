function startTest() {

function showQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('progress-text').textContent = `第 ${currentQuestion + 1}/20 题`;
  document.getElementById('progress-fill').style.width = `${(currentQuestion + 1) / 20 * 100}%`;
  document.getElementById('category-tag').textContent = q.category;
  document.getElementById('question-text').textContent = q.text;
  const ol = document.getElementById('option-list'); ol.innerHTML = '';
  ['A','B','C','D'].forEach((lbl, i) => {
    const li = document.createElement('li'); li.className = 'option-item';
    li.innerHTML = `<span class="option-label">${lbl}.</span> ${q.options[i]}`;
    li.onclick = () => selectOption(i, li); ol.appendChild(li);
  });
  document.getElementById('next-btn').disabled = true;
  document.getElementById('next-btn').textContent = currentQuestion < 19 ? '下一题 →' : '查看结果 ✨';
}

function selectOption(index, element) {
  document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
  element.classList.add('selected');
  document.getElementById('next-btn').disabled = false;
  element.dataset.selectedIndex = index;
}

function nextQuestion() {
  const sel = document.querySelector('.option-item.selected');
  if (!sel) return;
  const idx = parseInt(sel.dataset.selectedIndex);
  answers.push(idx);
  const q = questions[currentQuestion];
  const sm = { 0: 4, 1: 3, 2: 2, 3: 1 };
  scores[q.category] += sm[idx];
  currentQuestion++;
  if (currentQuestion < 20) { showQuestion(); document.getElementById('question-page').classList.remove('fade-in'); void document.getElementById('question-page').offsetWidth; document.getElementById('question-page').classList.add('fade-in'); }
  else showResult();
}

function showResult() {
  document.getElementById('question-page').classList.add('hidden');
  document.getElementById('result-page').classList.remove('hidden');
  document.getElementById('result-page').classList.add('fade-in');
  const total = Object.values(scores).reduce((a,b)=>a+b,0);
  const pct = Math.round(total / 80 * 100);
  let rk;
  if (pct >= 70) rk = 'bornLeader';
  else if (pct >= 50) rk = 'strategist';
  else if (pct >= 30) rk = 'executor';
  else rk = 'observer';
  const r = resultTypes[rk];
  document.getElementById('result-icon').textContent = r.icon;
  document.getElementById('result-name').textContent = r.name;
  document.getElementById('result-desc').textContent = r.desc;
  document.getElementById('score-number').textContent = pct + '%';
  document.getElementById('score-bar-fill').style.width = pct + '%';
  const hints = { bornLeader: '很高——政治基因深入骨髓', strategist: '中高——幕后大脑，智囊之才', executor: '中等——落地能手，执行中坚', observer: '发展中——诚实面对自己是最好的开始' };
  document.getElementById('score-hint').textContent = hints[rk];
  document.getElementById('interpret-core').textContent = r.core;
  document.getElementById('interpret-mechanism').textContent = r.mechanism;
  document.getElementById('path-a-title').textContent = r.pathA.title;
  document.getElementById('path-a-desc').textContent = r.pathA.desc;
  document.getElementById('path-b-title').textContent = r.pathB.title;
  document.getElementById('path-b-desc').textContent = r.pathB.desc;
  document.getElementById('action-steps').innerHTML = r.actions.map((a,i)=>`<div class="action-step"><span class="step-num">${i+1}</span>${a}</div>`).join('');
  drawRadar();
}

function drawRadar() {
  const c = document.getElementById('radar-chart');
  const dims = ["领导格局","决策风格","人际手腕","抗压韧性","使命感"];
  const maxD = 16, cx = 125, cy = 125, R = 100;
  let s = `<svg class="radar-svg" viewBox="0 0 250 250">`;
  for (let lv=1; lv<=4; lv++) {
    let pts = []; for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const r = R*lv/4; pts.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`); }
    s += `<polygon points="${pts.join(' ')}" fill="none" stroke="#C3D9F0" stroke-width="1" opacity="0.6"/>`;
  }
  for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; s += `<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(a)}" y2="${cy+R*Math.sin(a)}" stroke="#C3D9F0" stroke-width="1"/>`; }
  let dp = []; for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const r = R*Math.min(scores[dims[i]]/maxD,1); dp.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`); }
  s += `<polygon points="${dp.join(' ')}" fill="rgba(135,206,250,0.25)" stroke="#87CEFA" stroke-width="2.5"/>`;
  for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const r = R*Math.min(scores[dims[i]]/maxD,1); s += `<circle cx="${cx+r*Math.cos(a)}" cy="${cy+r*Math.sin(a)}" r="5" fill="#64B5E6"/>`; }
  for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const lr = R+24; const x = cx+lr*Math.cos(a); const y = cy+lr*Math.sin(a); const anc = Math.abs(x-cx)<15?'middle':(x<cx?'end':'start'); s += `<text x="${x}" y="${y}" text-anchor="${anc}" dominant-baseline="middle" font-size="11" fill="#5A6D82">${dims[i]}</text>`; }
  s += '</svg>'; c.innerHTML = s;
}

function restartTest() { document.getElementById('result-page').classList.add('hidden'); document.getElementById('welcome-page').classList.remove('hidden'); currentQuestion=0; answers=[]; scores={"领导格局":0,"决策风格":0,"人际手腕":0,"抗压韧性":0,"使命感":0}; }

function shareResult() {
  const n = document.getElementById('result-name').textContent, d = document.getElementById('result-desc').textContent;
  const t = `测了「你是否适合从政」：${n} - ${d}`;
  navigator.share ? navigator.share({title:'你是否适合从政？',text:t}) : (navigator.clipboard.writeText(t), alert('结果已复制！'));
}
</script>
