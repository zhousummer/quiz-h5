<!DOCTYPE html>

<style>

}

}

}
.option-label {

  font-size: 16px;
  font-weight: 600;

}
.btn-primary {

.result-page .result-type { text-align: center; margin-bottom: 24px; }

.score-section { text-align: center; margin-bottom: 20px; }

.path-a { border: 2px solid #87CEFA; }

}
.hidden { display: none !important; }

}

</head>
<body>
<div class="container">

<!-- 欢迎页 -->
<div id="welcome-page" class="welcome-page">
  <div class="card">
    <div class="logo">
      <h1>🦋 你是高敏感人格还是钝感力人格？</h1>
      <p>20 题完整版 · 人格特质诊断</p>
    </div>
    <div class="desc">
      <span class="unlock-tag">解锁完整版测试</span><br>
      覆盖<strong>感知敏锐度、情绪反应、社交能耗、抗干扰力、自我认知</strong>五大维度<br>
      生成专属人格诊断报告 + 90天成长方案
    </div>
    <button class="btn btn-primary" onclick="startTest()">✨ 开始测试 →</button>
  </div>
</div>

<!-- 题目页 -->
<div id="question-page" class="question-page hidden">
  <div class="card">
    <div class="progress-text" id="progress-text">第 1/20 题</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:5%"></div></div>
    <div class="category-tag" id="category-tag">感知敏锐度</div>
    <div class="question-text" id="question-text"></div>
    <ul class="option-list" id="option-list"></ul>
    <button class="btn btn-primary" id="next-btn" disabled onclick="nextQuestion()">下一题 →</button>
  </div>
</div>

<!-- 结果页 -->
<div id="result-page" class="result-page hidden">
  <div class="card">
    <div class="result-type">
      <div class="result-type-icon" id="result-icon"></div>
      <div class="result-type-name" id="result-name"></div>
      <div class="result-type-desc" id="result-desc"></div>
    </div>
  </div>
  <div class="card">
    <div class="score-section">
      <div class="score-label">人格敏感度评分</div>
      <div class="score-number" id="score-number"></div>
      <div class="score-bar"><div class="score-bar-fill" id="score-bar-fill"></div></div>
      <div style="font-size:12px;color:#8AA0B8" id="score-hint"></div>
    </div>
  </div>
  <div class="card">
    <h3 style="font-size:16px;color:#4696D5;margin-bottom:12px">📊 五维人格特质雷达图</h3>
    <div class="radar-chart" id="radar-chart"></div>
  </div>
  <div class="card">
    <div class="interpret-card">
      <h4>🔍 核心解读</h4>
      <p id="interpret-core"></p>
    </div>
    <div class="interpret-card">
      <h4>🧠 人格行为模式</h4>
      <p id="interpret-mechanism"></p>
    </div>
  </div>
  <div class="card">
    <h3 style="font-size:16px;color:#4696D5;margin-bottom:12px">🛤️ 高敏感 → 钝感力 平衡路径</h3>
    <div class="path-compare">
      <div class="path-card path-a"><h5 id="path-a-title">当前状态</h5><p id="path-a-desc"></p></div>
      <div class="path-card path-b"><h5 id="path-b-title">成长方向</h5><p id="path-b-desc"></p></div>
    </div>
  </div>
  <div class="card">
    <div class="action-plan">
      <h4>🦋 90 天人格成长行动方案</h4>
      <div id="action-steps"></div>
    </div>
  </div>
  <div class="card" style="text-align:center">
    <button class="btn btn-primary" onclick="restartTest()">🔄 重新测试</button>
    <button class="btn btn-share" onclick="shareResult()">📤 分享结果</button>
  </div>
</div>

</div>

<script>
const questions = [
  // 维度1：感知敏锐度 (4题)
  { category: "感知敏锐度", text: "走进一个房间，你通常会最先注意到什么？", options: ["光线、气味、氛围的细微变化", "房间里有哪些人、他们在做什么", "整体感觉，不会关注细节", "看情况，有时候敏感有时候钝"] },
  { category: "感知敏锐度", text: "别人换了一个新发型或穿了新衣服，你会：", options: ["一眼就发现，甚至会说出来", "可能会注意到，但不确定", "除非很明显，否则不会注意到", "有时候注意有时候不注意"] },
  { category: "感知敏锐度", text: "你对声音的敏感程度是：", options: ["很敏感，细微噪音都会让我分心", "一般，太吵了才会不舒服", "不太敏感，能自动过滤背景音", "看心情和状态"] },

  { category: "情绪反应", text: "看到别人哭，你会有什么感觉？", options: ["鼻子一酸，自己也快哭了", "会关心，但不会太受影响", "理解但能保持情绪独立", "看那个人和我关系有多近"] },
  { category: "情绪反应", text: "朋友向你倾诉烦恼后，你通常：", options: ["自己也变得沉重，久久不能平复", "会安慰对方，但能抽离", "给建议但不代入情绪", "看事情严重程度"] },
  { category: "情绪反应", text: "看新闻里的负面事件，你的反应是：", options: ["会难过很久，反复想", "当时会不舒服，但很快过去", "知道是坏消息，但不影响心情", "尽量不看负面新闻"] },
  { category: "情绪反应", text: "别人对你说话的语气稍微不好，你会：", options: ["立刻察觉，心里反复琢磨", "注意到但告诉自己别多想", "不太在意，可能对方心情不好", "有时候在意有时候不在意"] },

  { category: "社交能耗", text: "参加完一场聚会后，你通常感觉：", options: ["精疲力竭，需要独处充电很久", "有点累但还好，睡一觉就恢复", "精神抖擞，社交让我充满能量", "看聚会氛围，有时候累有时候不累"] },
  { category: "社交能耗", text: "你更喜欢哪种社交方式？", options: ["一对一深聊，人多了我会累", "小圈子聚会，三五个人刚好", "大型聚会很嗨，人越多越兴奋", "混合，不同场合不同模式"] },
  { category: "社交能耗", text: "周末两天都排满社交活动，你的感觉是：", options: ["光是想想就累了，需要推掉一些", "可以接受，但下周要多休息", "太好了，充实的一周！", "看和谁在一起"] },
  { category: "社交能耗", text: "你需要独处的时间吗？", options: ["每天都需要，独处是充电方式", "需要但不用太多，偶尔就行", "不太需要，一个人反而无聊", "有时候需要有时候不需要"] },

  { category: "抗干扰力", text: "工作或学习时，周围有噪音你会：", options: ["完全无法集中，烦躁不安", "有点影响但能适应", "基本不受影响，能自动过滤", "戴上耳机就能解决"] },

    name: "成长探索型",
    desc: "你还在了解自己的人格特质——这不是迷茫，而是最有潜力的自我发现之旅",
    core: "你属于「成长探索型」。你可能还在摸索自己是偏敏感还是偏钝——这不是问题，而是宝贵的自我认知阶段。你像一块海绵，正在通过不同的经历来了解自己的真实人格。每一步探索都在靠近更真实的自己。",
    mechanism: "你的行为模式还处于「样本收集期」——你在不同的情境中表现不同，还没有固化的模式。这意味着你有最大的可塑性。现在的关键是：不带评判地观察自己，了解自己在什么情况下敏感、什么情况下钝。",
    pathA: { title: "自我观察", desc: "先不急着给自己贴标签，花时间在不同情境中观察自己的反应模式。" },
    pathB: { title: "多元体验", desc: "刻意体验不同类型的场景——社交、独处、刺激、安静——收集关于自己的数据。" },
    actions: [
      "第1-14天：做「情境日志」——记录每天在不同场景下的敏感/钝感反应",
      "第15-30天：刻意体验两种极端——一天高强度社交 vs 一天完全独处，对比感受",
      "第31-60天：找2-3个了解你的朋友，听听他们眼中你的敏感度",
      "第61-90天：基于三个月的观察，写出你的「人格特质初步判断」"
    ]
  }
};

let currentQuestion = 0;
let answers = [];
let scores = { "感知敏锐度": 0, "情绪反应": 0, "社交能耗": 0, "抗干扰力": 0, "自我认知": 0 };

function startTest() {
  document.getElementById('welcome-page').classList.add('hidden');
  document.getElementById('question-page').classList.remove('hidden');
  document.getElementById('question-page').classList.add('fade-in');
  currentQuestion = 0;
  answers = [];
  scores = { "感知敏锐度": 0, "情绪反应": 0, "社交能耗": 0, "抗干扰力": 0, "自我认知": 0 };
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('progress-text').textContent = `第 ${currentQuestion + 1}/20 题`;
  document.getElementById('progress-fill').style.width = `${(currentQuestion + 1) / 20 * 100}%`;
  document.getElementById('category-tag').textContent = q.category;
  document.getElementById('question-text').textContent = q.text;
  const optionList = document.getElementById('option-list');
  optionList.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const li = document.createElement('li');
    li.className = 'option-item';
    li.innerHTML = `<span class="option-label">${labels[i]}.</span> ${opt}`;
    li.onclick = () => selectOption(i, li);
    optionList.appendChild(li);
  });
  document.getElementById('next-btn').disabled = true;
  document.getElementById('next-btn').textContent = currentQuestion < 19 ? '下一题 →' : '查看结果 ✨';
}

function selectOption(index, element) {
  document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
  element.classList.add('selected');
  document.getElementById('next-btn').disabled = false;
  element.dataset.selectedIndex = index;
}

function nextQuestion() {
  const selected = document.querySelector('.option-item.selected');
  if (!selected) return;
  const idx = parseInt(selected.dataset.selectedIndex);
  answers.push(idx);
  
  // 计分：A=4(高敏感), B=3(偏敏感), C=1(钝感), D=2(中间)
  const q = questions[currentQuestion];
  const scoreMap = { 0: 4, 1: 3, 2: 1, 3: 2 };
  scores[q.category] += scoreMap[idx];
  
  currentQuestion++;
  if (currentQuestion < 20) {
    showQuestion();
    document.getElementById('question-page').classList.remove('fade-in');
    void document.getElementById('question-page').offsetWidth;
    document.getElementById('question-page').classList.add('fade-in');
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('question-page').classList.add('hidden');
  document.getElementById('result-page').classList.remove('hidden');
  document.getElementById('result-page').classList.add('fade-in');

  const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
  const maxScore = 80;
  const percentage = Math.round(totalScore / maxScore * 100);
  
  let resultKey;
  if (percentage >= 70) resultKey = 'highlySensitive';
  else if (percentage >= 45) resultKey = 'balanced';
  else if (percentage >= 25) resultKey = 'growing';
  else resultKey = 'highlyResilient';
  
  const result = resultTypes[resultKey];
  
  document.getElementById('result-icon').textContent = result.icon;
  document.getElementById('result-name').textContent = result.name;
  document.getElementById('result-desc').textContent = result.desc;
  document.getElementById('score-number').textContent = percentage + '%';
  document.getElementById('score-bar-fill').style.width = percentage + '%';
  
  const hints = { highlySensitive: '偏高——你的敏感是天赋，学会管理它', highlyResilient: '偏低——你的钝感是铠甲，偶尔打开让温柔进来', balanced: '适中——你已找到敏感和钝感之间的最佳平衡点', growing: '发展中——你正处于最有价值的自我发现阶段' };
  document.getElementById('score-hint').textContent = hints[resultKey];
  
  document.getElementById('interpret-core').textContent = result.core;
  document.getElementById('interpret-mechanism').textContent = result.mechanism;
  document.getElementById('path-a-title').textContent = result.pathA.title;
  document.getElementById('path-a-desc').textContent = result.pathA.desc;
  document.getElementById('path-b-title').textContent = result.pathB.title;
  document.getElementById('path-b-desc').textContent = result.pathB.desc;
  
  const stepsDiv = document.getElementById('action-steps');
  stepsDiv.innerHTML = result.actions.map((a, i) => 
    `<div class="action-step"><span class="step-num">${i+1}</span>${a}</div>`
  ).join('');
  
  drawRadar();
}

function drawRadar() {
  const container = document.getElementById('radar-chart');
  const dims = ["感知敏锐度", "情绪反应", "社交能耗", "抗干扰力", "自我认知"];
  const maxDimScore = 16;
  const center = 125, radius = 100;
  
  let svg = `<svg class="radar-svg" viewBox="0 0 250 250">`;
  
  for (let level = 1; level <= 4; level++) {
    let pts = [];
    for (let i = 0; i < 5; i++) {
      const angle = Math.PI * 2 * i / 5 - Math.PI / 2;
      const r = radius * level / 4;
      pts.push(`${center + r * Math.cos(angle)},${center + r * Math.sin(angle)}`);
    }
    svg += `<polygon points="${pts.join(' ')}" fill="none" stroke="#C3D9F0" stroke-width="1" opacity="0.6"/>`;
  }
  
  for (let i = 0; i < 5; i++) {
    const angle = Math.PI * 2 * i / 5 - Math.PI / 2;
    svg += `<line x1="${center}" y1="${center}" x2="${center + radius * Math.cos(angle)}" y2="${center + radius * Math.sin(angle)}" stroke="#C3D9F0" stroke-width="1"/>`;
  }
  
  let dataPts = [];
  for (let i = 0; i < 5; i++) {
    const angle = Math.PI * 2 * i / 5 - Math.PI / 2;
    const r = radius * Math.min(scores[dims[i]] / maxDimScore, 1);
    dataPts.push(`${center + r * Math.cos(angle)},${center + r * Math.sin(angle)}`);
  }
  svg += `<polygon points="${dataPts.join(' ')}" fill="rgba(135,206,250,0.25)" stroke="#87CEFA" stroke-width="2.5"/>`;
  
  for (let i = 0; i < 5; i++) {
    const angle = Math.PI * 2 * i / 5 - Math.PI / 2;
    const r = radius * Math.min(scores[dims[i]] / maxDimScore, 1);
    svg += `<circle cx="${center + r * Math.cos(angle)}" cy="${center + r * Math.sin(angle)}" r="5" fill="#64B5E6"/>`;
  }
  
  for (let i = 0; i < 5; i++) {
    const angle = Math.PI * 2 * i / 5 - Math.PI / 2;
    const labelR = radius + 24;
    const x = center + labelR * Math.cos(angle);
    const y = center + labelR * Math.sin(angle);
    const anchor = Math.abs(x - center) < 15 ? 'middle' : (x < center ? 'end' : 'start');
    svg += `<text x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="middle" font-size="11" fill="#5A6D82">${dims[i]}</text>`;
  }
  
  svg += '</svg>';
  container.innerHTML = svg;
}

function restartTest() {
  document.getElementById('result-page').classList.add('hidden');
  document.getElementById('welcome-page').classList.remove('hidden');
  currentQuestion = 0;
  answers = [];
  scores = { "感知敏锐度": 0, "情绪反应": 0, "社交能耗": 0, "抗干扰力": 0, "自我认知": 0 };
}

function shareResult() {
  const name = document.getElementById('result-name').textContent;
  const desc = document.getElementById('result-desc').textContent;
  const text = `测了「你是高敏感人格还是钝感力人格」：${name} - ${desc}`;
  if (navigator.share) {
    navigator.share({ title: '你是高敏感人格还是钝感力人格？', text: text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('结果已复制，粘贴分享给朋友吧！'));
  }
}
</script>
