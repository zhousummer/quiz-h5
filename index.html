<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理测试合集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;padding:20px;color:#333}
.container{max-width:800px;margin:0 auto}
h1{font-size:28px;text-align:center;margin:30px 0 10px;color:#2c3e50}
.subtitle{text-align:center;color:#7f8c8d;margin-bottom:30px;font-size:15px}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{display:block;background:white;border-radius:12px;padding:20px;text-decoration:none;color:#333;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-left:4px solid #3498db;transition:all 0.2s}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.card .icon{font-size:28px;margin-bottom:6px}
.card h3{font-size:17px;margin-bottom:4px;font-weight:600}
.card p{font-size:13px;color:#7f8c8d;margin:0}
.card.c1{border-left-color:#e74c3c}
.card.c2{border-left-color:#2ecc71}
.card.c3{border-left-color:#f39c12}
.card.c4{border-left-color:#9b59b6}
.card.c5{border-left-color:#1abc9c}
.card.c6{border-left-color:#e67e22}
.card.c7{border-left-color:#3498db}
.card.c8{border-left-color:#e84393}
.card.c9{border-left-color:#00b894}
.card.c10{border-left-color:#6c5ce7}
.card.c11{border-left-color:#fd79a8}
.card.c12{border-left-color:#0984e3}
.card.c13{border-left-color:#fdcb6e}
.card.c14{border-left-color:#e17055}
.card.c15{border-left-color:#00cec9}
.card.c16{border-left-color:#f8a5c2}
.card.c17{border-left-color:#ffd93d}
.footer{text-align:center;color:#b2bec3;font-size:12px;margin-top:40px;padding-bottom:20px}
@media(max-width:500px){.card-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <h1>🧠 心理测试合集</h1>
  <p class="subtitle">多套专业心理测试，帮你更好地认识自己</p >
  <div class="card-grid">

    <a class="card c2" href=" ">
      <div class="icon">🛤️</div>
      <h3>你适合轨道人生还是旷野人生？</h3>
      <p>20题完整版 - 人生规划倾向测试</p >
    </a >

    <a class="card c1" href="/quiz-h5/quiz-tired-or-quit/">
      <div class="icon">❤️</div>
      <h3>现在的你更适合恋爱还是独处？</h3>
      <p>20题完整版 - 情感状态测试</p >
    </a >

    <a class="card c17" href="/quiz-h5/quiz-age-preference/">
      <div class="icon">💞</div>
      <h3>你适合年上还是年下？</h3>
      <p>20题完整版 - 恋爱年龄倾向测试</p >
    </a >

    <a class="card c3" href="/quiz-h5/quiz-love-style/">
      <div class="icon">💘</div>
      <h3>你更容易日久生情还是一见钟情？</h3>
      <p>20题完整版 - 爱情风格测试</p >
    </a >

  </div>
  <div class="footer">持续更新中 · 更多测试即将上线</div>
</div>
</body>
</html>
