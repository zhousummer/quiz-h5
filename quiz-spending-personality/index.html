<body>
<div class="container">

<div id="welcome-page" class="welcome-page">
  <div class="card">
    <div class="logo">
      <h1>💰 测测你的花钱人格<br>你是月光族还是守财奴？</h1>

    </div>
    <div class="vs-row">

  </div>
</div>

<div id="question-page" class="question-page hidden">
  <div class="card">

    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:5%"></div></div>
    <div class="category-tag" id="category-tag">消费冲动</div>
    <div class="question-text" id="question-text"></div>
    <ul class="option-list" id="option-list"></ul>
    <button class="btn btn-primary" id="next-btn" disabled onclick="nextQuestion()">下一题 →</button>
  </div>
</div>

<div id="result-page" class="result-page hidden">
  <div class="card">
    <div class="result-type">
      <div class="result-type-icon" id="result-icon"></div>
      <div class="result-type-name" id="result-name"></div>
      <div class="result-type-desc" id="result-desc"></div>
    </div>
  </div>
  <div class="card">
    <div class="score-section">
      <div class="score-label">消费冲动指数</div>
      <div class="score-number" id="score-number"></div>
      <div class="score-bar"><div class="score-bar-fill" id="score-bar-fill"></div></div>
      <div style="font-size:12px;color:#8AA0B8" id="score-hint"></div>
    </div>
  </div>
  <div class="card">
    <h3 style="font-size:16px;color:#4696D5;margin-bottom:12px">📊 五维花钱人格雷达图</h3>
    <div class="radar-chart" id="radar-chart"></div>
  </div>
  <div class="card">
    <div class="interpret-card"><h4>🔍 核心解读</h4><p id="interpret-core"></p></div>
    <div class="interpret-card"><h4>🧠 消费心理机制</h4><p id="interpret-mechanism"></p></div>
  </div>
  <div class="card">

    <div class="path-compare">
      <div class="path-card path-a"><h5 id="path-a-title">当前模式</h5><p id="path-a-desc"></p></div>
      <div class="path-card path-b"><h5 id="path-b-title">成长方向</h5><p id="path-b-desc"></p></div>
    </div>
  </div>
  <div class="card">
    <div class="action-plan"><h4>💰 90 天理财成长行动方案</h4><div id="action-steps"></div></div>
  </div>
  <div class="card" style="text-align:center">
    <button class="btn btn-primary" onclick="restartTest()">🔄 重新测试</button>
    <button class="btn btn-share" onclick="shareResult()">📤 分享结果</button>
  </div>
</div>

</div>

<script>

    mechanism: "你的消费心理是「情绪驱动」——压力大时花钱、开心时花钱、不开心时也花钱。你的消费行为更多受情绪而非理性控制。关键转变：从「情绪消费」到「有意识的消费」，建立消费前的「暂停机制」。",
    pathA: { title: "过山车模式", desc: "冲动消费→后悔→发誓省钱→压力/诱惑→又冲动→更后悔。循环加剧。" },
    pathB: { title: "稳定方向", desc: "识别消费触发点→建立暂停机制→用替代行为满足情绪→消费回归理性。" },
    actions: ["第1-14天：做「消费情绪日记」——记录每次花钱前的心情和触发事件", "第15-30天：找出你的3个「消费触发点」（如：压力大、无聊、社交比较）", "第31-60天：为每个触发点设计一个「替代行为」（如：压力大去跑步而不是逛淘宝）", "第61-90天：给自己设定一个「无愧疚消费额度」，在这个额度内尽情花不后悔"]
  }
};

let currentQuestion = 0, answers = [], scores = { "消费冲动": 0, "金钱观念": 0, "储蓄习惯": 0, "消费决策": 0, "金钱态度": 0 };

function startTest() {
  document.getElementById('welcome-page').classList.add('hidden');
  document.getElementById('question-page').classList.remove('hidden');
  document.getElementById('question-page').classList.add('fade-in');
  currentQuestion = 0; answers = [];
  scores = { "消费冲动": 0, "金钱观念": 0, "储蓄习惯": 0, "消费决策": 0, "金钱态度": 0 };
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('progress-text').textContent = `第 ${currentQuestion + 1}/20 题`;
  document.getElementById('progress-fill').style.width = `${(currentQuestion + 1) / 20 * 100}%`;
  document.getElementById('category-tag').textContent = q.category;
  document.getElementById('question-text').textContent = q.text;
  const ol = document.getElementById('option-list'); ol.innerHTML = '';
  ['A','B','C','D'].forEach((lbl, i) => {
    const li = document.createElement('li'); li.className = 'option-item';
    li.innerHTML = `<span class="option-label">${lbl}.</span> ${q.options[i]}`;
    li.onclick = () => selectOption(i, li); ol.appendChild(li);
  });
  document.getElementById('next-btn').disabled = true;
  document.getElementById('next-btn').textContent = currentQuestion < 19 ? '下一题 →' : '查看结果 ✨';
}

function selectOption(index, element) {
  document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
  element.classList.add('selected');
  document.getElementById('next-btn').disabled = false;
  element.dataset.selectedIndex = index;
}

function nextQuestion() {
  const sel = document.querySelector('.option-item.selected');
  if (!sel) return;
  const idx = parseInt(sel.dataset.selectedIndex);
  answers.push(idx);
  const q = questions[currentQuestion];
  const sm = { 0: 4, 1: 1, 2: 3, 3: 2 };
  scores[q.category] += sm[idx];
  currentQuestion++;
  if (currentQuestion < 20) { showQuestion(); document.getElementById('question-page').classList.remove('fade-in'); void document.getElementById('question-page').offsetWidth; document.getElementById('question-page').classList.add('fade-in'); }
  else showResult();
}

function showResult() {
  document.getElementById('question-page').classList.add('hidden');
  document.getElementById('result-page').classList.remove('hidden');
  document.getElementById('result-page').classList.add('fade-in');
  const total = Object.values(scores).reduce((a,b)=>a+b,0);
  const pct = Math.round(total / 80 * 100);
  let rk;
  if (pct >= 70) rk = 'spender';
  else if (pct >= 50) rk = 'rollercoaster';
  else if (pct >= 30) rk = 'balanced';
  else rk = 'saver';
  const r = resultTypes[rk];
  document.getElementById('result-icon').textContent = r.icon;
  document.getElementById('result-name').textContent = r.name;
  document.getElementById('result-desc').textContent = r.desc;
  document.getElementById('score-number').textContent = pct + '%';
  document.getElementById('score-bar-fill').style.width = pct + '%';
  const hints = { spender: '偏高——快乐至上，记得留点安全垫', saver: '偏低——安全感满满，偶尔犒劳一下自己吧', balanced: '适中——你和钱的关系最健康', rollercoaster: '中等偏高——情绪驱动消费，学会暂停' };
  document.getElementById('score-hint').textContent = hints[rk];
  document.getElementById('interpret-core').textContent = r.core;
  document.getElementById('interpret-mechanism').textContent = r.mechanism;
  document.getElementById('path-a-title').textContent = r.pathA.title;
  document.getElementById('path-a-desc').textContent = r.pathA.desc;
  document.getElementById('path-b-title').textContent = r.pathB.title;
  document.getElementById('path-b-desc').textContent = r.pathB.desc;
  document.getElementById('action-steps').innerHTML = r.actions.map((a,i)=>`<div class="action-step"><span class="step-num">${i+1}</span>${a}</div>`).join('');
  drawRadar();
}

function drawRadar() {
  const c = document.getElementById('radar-chart');
  const dims = ["消费冲动","金钱观念","储蓄习惯","消费决策","金钱态度"];
  const maxD = 16, cx = 125, cy = 125, R = 100;
  let s = `<svg class="radar-svg" viewBox="0 0 250 250">`;
  for (let lv=1; lv<=4; lv++) {
    let pts = []; for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const r = R*lv/4; pts.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`); }
    s += `<polygon points="${pts.join(' ')}" fill="none" stroke="#C3D9F0" stroke-width="1" opacity="0.6"/>`;
  }
  for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; s += `<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(a)}" y2="${cy+R*Math.sin(a)}" stroke="#C3D9F0" stroke-width="1"/>`; }
  let dp = []; for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const r = R*Math.min(scores[dims[i]]/maxD,1); dp.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`); }
  s += `<polygon points="${dp.join(' ')}" fill="rgba(135,206,250,0.25)" stroke="#87CEFA" stroke-width="2.5"/>`;
  for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const r = R*Math.min(scores[dims[i]]/maxD,1); s += `<circle cx="${cx+r*Math.cos(a)}" cy="${cy+r*Math.sin(a)}" r="5" fill="#64B5E6"/>`; }
  for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const lr = R+24; const x = cx+lr*Math.cos(a); const y = cy+lr*Math.sin(a); const anc = Math.abs(x-cx)<15?'middle':(x<cx?'end':'start'); s += `<text x="${x}" y="${y}" text-anchor="${anc}" dominant-baseline="middle" font-size="11" fill="#5A6D82">${dims[i]}</text>`; }
  s += '</svg>'; c.innerHTML = s;
}

function restartTest() { document.getElementById('result-page').classList.add('hidden'); document.getElementById('welcome-page').classList.remove('hidden'); currentQuestion=0; answers=[]; scores={"消费冲动":0,"金钱观念":0,"储蓄习惯":0,"消费决策":0,"金钱态度":0}; }

function shareResult() {
  const n = document.getElementById('result-name').textContent, d = document.getElementById('result-desc').textContent;
  const t = `测了「花钱人格」：${n} - ${d}`;
  navigator.share ? navigator.share({title:'测测你的花钱人格',text:t}) : (navigator.clipboard.writeText(t), alert('结果已复制！'));
}
</script>
