<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>测测你的孤独等级 - 20题完整版孤独类型测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F3E5F5;min-height:100vh;color:#1A1A2E}
.container{max-width:500px;margin:0 auto;padding:20px}
.welcome{text-align:center;padding-top:50px}
.welcome .emoji-top{font-size:64px;margin-bottom:16px}
.welcome h1{font-size:30px;color:#4A148C;margin-bottom:10px;line-height:1.4}
.welcome .subtitle{font-size:15px;color:#7B1FA2;margin-bottom:28px;line-height:1.6}
.welcome .dims{text-align:left;margin-bottom:36px;background:white;border-radius:20px;padding:20px 24px;box-shadow:0 4px 20px rgba(74,20,140,0.10)}
.welcome .dim-item{display:flex;align-items:center;gap:12px;padding:9px 0;font-size:15px;color:#4A148C}
.welcome .dim-item .dot{width:8px;height:8px;border-radius:50%;background:#CE93D8;flex-shrink:0}
.btn{display:inline-block;padding:16px 60px;background:linear-gradient(135deg,#AB47BC,#7B1FA2);color:white;font-size:20px;font-weight:bold;border:none;border-radius:40px;cursor:pointer;text-decoration:none;box-shadow:0 6px 24px rgba(123,31,162,0.35);transition:all 0.3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(123,31,162,0.45)}
.btn:active{transform:translateY(0)}
.btn-small{padding:12px 40px;font-size:16px}
.quiz-page{display:none}.quiz-page.active{display:block}
.progress-bar{width:100%;height:8px;background:#E1BEE7;border-radius:4px;margin-bottom:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#AB47BC,#7B1FA2);border-radius:4px;transition:width 0.4s ease}
.progress-text{text-align:center;font-size:14px;color:#7B1FA2;margin-bottom:28px}
.question{margin-bottom:26px}
.question .q-num{display:inline-block;width:36px;height:36px;line-height:36px;text-align:center;background:#AB47BC;color:white;border-radius:50%;font-weight:bold;font-size:16px;margin-right:10px;vertical-align:middle}
.question h3{display:inline;font-size:20px;color:#4A148C;line-height:1.5}
.options{margin-top:18px}
.option{display:block;width:100%;padding:18px 20px;margin-bottom:12px;background:white;border:2px solid #CE93D8;border-radius:16px;font-size:16px;color:#1A1A2E;text-align:left;cursor:pointer;transition:all 0.3s}
.option:hover{border-color:#AB47BC;background:#F3E5F5}
.option.selected{border-color:#AB47BC;background:#E1BEE7;box-shadow:0 2px 12px rgba(123,31,162,0.15)}
.option .opt-label{display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;background:#AB47BC;color:white;border-radius:50%;font-weight:bold;font-size:14px;margin-right:12px}
.quick-result{display:none;text-align:center;padding-top:30px}
.quick-result.active{display:block}
.quick-result .result-type{font-size:52px;margin-bottom:8px}
.quick-result .result-name{font-size:28px;font-weight:bold;color:#4A148C;margin-bottom:10px}
.quick-result .result-desc{font-size:15px;color:#7B1FA2;margin-bottom:28px;line-height:1.6}
.quick-result .result-chart{margin:16px auto;max-width:280px}
.quick-result .upgrade-box{background:white;border-radius:20px;padding:28px 20px;margin-top:28px;box-shadow:0 4px 20px rgba(74,20,140,0.10)}
.quick-result .upgrade-box h4{font-size:20px;color:#4A148C;margin-bottom:12px}
.quick-result .upgrade-box p{font-size:14px;color:#7B1FA2;margin-bottom:20px;line-height:1.6}
.full-result{display:none;text-align:center;padding-top:24px}
.full-result.active{display:block}
.full-result .result-type{font-size:60px;margin-bottom:8px}
.full-result .result-name{font-size:32px;font-weight:bold;color:#4A148C;margin-bottom:8px}
.full-result .score{display:inline-block;padding:8px 24px;background:#E1BEE7;border-radius:20px;font-size:16px;color:#4A148C;margin-bottom:20px}
.full-result .result-desc{font-size:15px;color:#1A1A2E;line-height:1.8;text-align:left;margin-bottom:20px;padding:20px;background:white;border-radius:16px}
.full-result .chart-box{background:white;border-radius:20px;padding:20px;margin:20px 0;box-shadow:0 4px 20px rgba(74,20,140,0.10)}
.full-result .chart-box h4{font-size:18px;color:#4A148C;margin-bottom:14px}
.full-result .radar-container{width:280px;height:280px;margin:0 auto}
.full-result .action-plan{text-align:left;background:white;border-radius:16px;padding:20px;margin:20px 0}
.full-result .action-plan h4{font-size:18px;color:#4A148C;margin-bottom:16px;text-align:center}
.full-result .action-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #E1BEE7}
.full-result .action-item:last-child{border-bottom:none}
.full-result .action-num{width:28px;height:28px;line-height:28px;text-align:center;background:#AB47BC;color:white;border-radius:50%;font-weight:bold;font-size:14px;flex-shrink:0}
.full-result .action-text{font-size:14px;color:#1A1A2E;line-height:1.6}
.full-result .path-box{text-align:left;background:white;border-radius:16px;padding:20px;margin:20px 0}
.full-result .path-box h4{font-size:18px;color:#4A148C;margin-bottom:14px;text-align:center}
.hidden{display:none}
</style>
</head>
<body>
<div class="container" id="app">

<div class="welcome" id="welcome">
  <div class="emoji-top">🌙</div>
  <h1>测测你的孤独等级</h1>
  <p class="subtitle">20题深度扫描你的孤独类型与内心状态</p>
  <div class="dims">
    <div class="dim-item"><span class="dot"></span> 社交状态 —— 你身边有没有人？</div>
    <div class="dim-item"><span class="dot"></span> 情绪连接 —— 你有能倾诉的人吗？</div>
    <div class="dim-item"><span class="dot"></span> 独处感受 —— 你一个人时是什么状态？</div>
    <div class="dim-item"><span class="dot"></span> 被理解感 —— 你觉得有人懂你吗？</div>
    <div class="dim-item"><span class="dot"></span> 自我关系 —— 你和自己的关系怎么样？</div>
  </div>
  <button class="btn" onclick="startQuiz()">开始测试</button>
</div>

<div class="quiz-page" id="quizPage">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">1/5</div>
  <div class="question"><span class="q-num" id="qNum">1</span><h3 id="qText"></h3></div>
  <div class="options" id="optionsBox"></div>
  <button class="btn btn-small hidden" id="nextBtn" onclick="nextQuestion()">下一题</button>
</div>

<div class="quick-result" id="quickResult">
  <div class="result-type" id="qrType"></div>
  <div class="result-name" id="qrName"></div>
  <div class="result-desc" id="qrDesc"></div>
  <div class="result-chart"><canvas id="quickRadar" width="260" height="260"></canvas></div>
  <div class="upgrade-box">
    <h4>🎯 以上只是5题快速版</h4>
    <p>完成全部20题，你将获得：<br>
    ✅ 精确的孤独类型标签<br>
    ✅ 五维雷达图深度分析<br>
    ✅ 你的孤独状态解读<br>
    ✅ 专属疗愈行动建议</p>
    <button class="btn" onclick="showFullQuiz()">解锁完整20题测试</button>
  </div>
</div>

<div class="quiz-page" id="fullQuizPage">
  <div class="progress-bar"><div class="progress-fill" id="fullProgressFill"></div></div>
  <div class="progress-text" id="fullProgressText">6/25</div>
  <div class="question"><span class="q-num" id="fullQNum">6</span><h3 id="fullQText"></h3></div>
  <div class="options" id="fullOptionsBox"></div>
  <button class="btn btn-small hidden" id="fullNextBtn" onclick="fullNextQuestion()">下一题</button>
</div>

<div class="full-result" id="fullResult"></div>

</div>

<script>
// ===== 快速版5题 =====
const quickQuestions = [
  {q:"你身边有多少可以随时约出来的人？", opts:["很多，随时可以约","有几个，但需要提前约","很少，大部分时间约不到人","几乎没有，习惯了"], scores:[1,2,3,4]},
  {q:"当你难过的时候，你通常会：", opts:["主动找朋友倾诉","想找人但犹豫要不要开口","一个人扛着，不想麻烦别人","不知道可以和谁说"], scores:[1,2,3,4]},
  {q:"一个人在家的时候，你通常：", opts:["很充实，有做不完的事","大部分时候还不错","会有点不安，想找人说话","很难熬，觉得特别空"], scores:[1,2,3,4]},
  {q:"你觉得有人能完全理解你的情绪吗？", opts:["有，至少有一个人","可能有人懂一部分","好像没有人真的懂","连我自己都搞不懂"], scores:[1,2,3,4]},
  {q:"你内心最真实的状态是：", opts:["我挺喜欢自己现在的生活","有时候孤独，但也接受了","我想改变，但不知道从哪里开始","孤独已经成了我的底色"], scores:[1,2,3,4]}
];

// ===== 完整版20题 =====
const fullQuestions = [
  // 维度1: 社交状态 (1-4)
  {q:"你身边有多少个可以随时约出来的人？", opts:["很多，随时可以约","有几个，但需要提前约","很少，大部分时间约不到人","几乎没有，习惯了"], scores:[1,2,3,4]},
  {q:"周末没人约你的时候，你通常会：", opts:["主动去约别人","也挺好，正好做自己的事","有点失落，但不会主动","习惯了，甚至享受一个人"], scores:[1,2,3,4]},
  {q:"你最近一次和别人深度聊天是什么时候？", opts:["今天","这周","上个月","记不清了"], scores:[1,2,3,4]},
  {q:"你的社交圈状态是：", opts:["稳定且有新朋友进来","稳定但圈子变小了","在缩小，老朋友联系变少","几乎没有什么社交圈"], scores:[1,2,3,4]},
  // 维度2: 情绪连接 (5-8)
  {q:"当你遇到开心的事，你第一反应是：", opts:["立刻分享给某个人","会分享，但有时找不到合适的人","发个朋友圈就当分享了","自己消化，没人可说"], scores:[1,2,3,4]},
  {q:"当你难过的时候，你通常会：", opts:["主动找朋友倾诉","想找人但犹豫要不要开口","一个人扛着，不想麻烦别人","不知道可以和谁说"], scores:[1,2,3,4]},
  {q:"你觉得有人能完全理解你的情绪吗？", opts:["有，至少有一个人","可能有人懂一部分","好像没有人真的懂","连我自己都搞不懂"], scores:[1,2,3,4]},
  {q:"你上一次在别人面前真实地表达情绪是什么时候？", opts:["最近几天","最近几周","最近几个月","已经很久了"], scores:[1,2,3,4]},
  // 维度3: 独处感受 (9-12)
  {q:"一个人在家的时候，你通常：", opts:["很充实，有做不完的事","大部分时候还不错","会有点不安，想找人说话","很难熬，觉得特别空"], scores:[1,2,3,4]},
  {q:"夜深人静的时候，你最容易：", opts:["安然入睡","想一想今天的事","开始胡思乱想","被强烈的孤独感包围"], scores:[1,2,3,4]},
  {q:"你觉得自己和「自己」的关系怎么样？", opts:["很好，我享受自己的陪伴","还行，能一个人待着","不太好，不太喜欢一个人的感觉","很糟糕，一个人的时候会难受"], scores:[1,2,3,4]},
  {q:"你更害怕哪种孤独？", opts:["一个人待着","在人群中却没人说话","没有人真正关心你","没有人在意你的存在"], scores:[1,2,3,4]},
  // 维度4: 被理解感 (13-16)
  {q:"你觉得有多少人真正了解你？", opts:["有2个以上","有1-2个","可能没有","我觉得没人了解我"], scores:[1,2,3,4]},
  {q:"你有没有觉得自己「和周围人格格不入」？", opts:["没有，我觉得挺融入的","偶尔会这么觉得","经常有这种感觉","一直都这么觉得"], scores:[1,2,3,4]},
  {q:"你觉得别人眼中的你和你真实的你：", opts:["差不多","有一点差距","差距很大","完全是两个人"], scores:[1,2,3,4]},
  {q:"你更常说哪句话？", opts:["「有人懂我」","「好像没人懂我」","「算了，说了也不懂」","「没有人会懂」"], scores:[1,2,3,4]},
  // 维度5: 自我关系 (17-20)
  {q:"你对自己生活的满意度是：", opts:["很满意","还可以","不太满意","很不满意"], scores:[1,2,3,4]},
  {q:"你觉得自己孤独是因为：", opts:["环境原因（刚搬家/换工作/朋友不在身边）","关系原因（没有人能真正连接）","自己原因（不太会经营关系）","阶段原因（人生正在转折期）"], scores:[1,2,3,4]},
  {q:"你最近有没有觉得自己在「变好但很孤独」？", opts:["没有，我在变好也有人见证","有一点，成长总是孤独的","有，感觉自己默默变好但没人看见","我没有在变好"], scores:[1,2,3,4]},
  {q:"你内心最真实的状态是：", opts:["我挺喜欢自己现在的生活","有时候孤独，但也接受了","我想改变，但不知道从哪里开始","孤独已经成了我的底色"], scores:[1,2,3,4]}
];

// ===== 6种孤独类型 =====
const results = [
  {type:"🌊", name:"人群孤独型", desc:"你不是真的没有社交，相反，你的身边可能有不少人。但你在人群中依然感到孤独——你和他们在一起，但你和他们之间隔着一层看不见的玻璃。你参与着热闹，却无法真正融入。这种孤独感，有时候比一个人更强烈。", label:"人群中的孤独者", emoji:"🌊"},
  {type:"🌙", name:"独处孤独型", desc:"你一个人的时候，最容易感受到孤独。安静的环境放大了你内心的空洞，你会不自觉地打开手机、刷社交软件，只是为了逃避和自己独处。你不是害怕安静，你是害怕安静里只有自己。", label:"独处时的敏感者", emoji:"🌙"},
  {type:"🏔️", name:"选择孤独型", desc:"你不是没有能力社交，你是主动选择了独处。你享受一个人的时间，不需要用社交来填满生活。你的孤独不是痛苦的，而是一种清醒的自我陪伴。你孤独，但你不孤单。", label:"清醒的独行者", emoji:"🏔️"},
  {type:"💔", name:"失联孤独型", desc:"你感觉自己和世界之间隔着一层厚厚的玻璃。你看得见别人在笑、在闹，但你触碰不到他们。你不确定是自己主动走远了，还是世界把你推开了。那种连接断裂的感觉，比任何形式的孤独都更沉重。", label:"被世界遗忘的人", emoji:"💔"},
  {type:"🌱", name:"成长孤独型", desc:"你正在经历人生的转折期——可能在换工作、在换城市、在重新定义自己。成长本身就是一件孤独的事，你在变好，但这个过程是沉默的。你的孤独是向上的，是蜕变的代价。", label:"蜕变的赶路人", emoji:"🌱"},
  {type:"🧊", name:"情绪孤独型", desc:"你最深的孤独不是身边没人，而是你的情绪无人能接住。开心的时候没人可以分享，难过的时候没人可以倾诉。你有一个丰富多彩的内心世界，但没有人能走进来。", label:"情绪无处安放的人", emoji:"🧊"}
];

// ===== 雷达图维度名称 =====
const dimNames = ["社交状态","情绪连接","独处感受","被理解感","自我关系"];

let quickAnswers=[], quickCurrent=0, fullAnswers=[], fullCurrent=0;

function startQuiz(){
  document.getElementById('welcome').style.display='none';
  document.getElementById('quizPage').classList.add('active');
  document.getElementById('quizPage').style.display='block';
  quickCurrent=0; quickAnswers=[]; showQuickQuestion();
}

function showQuickQuestion(){
  if(quickCurrent >= 5){ showQuickResult(); return; }
  const q = quickQuestions[quickCurrent];
  document.getElementById('qNum').textContent = quickCurrent + 1;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = ((quickCurrent / 5) * 100) + '%';
  document.getElementById('progressText').textContent = (quickCurrent + 1) + '/5';
  let html = '';
  q.opts.forEach((opt, i) => {
    const sel = (quickAnswers[quickCurrent] === i) ? ' selected' : '';
    html += `<button class="option${sel}" onclick="selectQuick(${i})"><span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}</button>`;
  });
  document.getElementById('optionsBox').innerHTML = html;
  document.getElementById('nextBtn').classList.add('hidden');
}

function selectQuick(idx){
  quickAnswers[quickCurrent] = idx;
  document.querySelectorAll('#optionsBox .option').forEach((el, i) => el.classList.toggle('selected', i === idx));
  document.getElementById('nextBtn').classList.remove('hidden');
}
function nextQuestion(){ quickCurrent++; showQuickQuestion(); }

function showQuickResult(){
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('quizPage').classList.remove('active');
  document.getElementById('quickResult').classList.add('active');
  document.getElementById('quickResult').style.display = 'block';
  let total = 0;
  quickAnswers.forEach((a, i) => { total += quickQuestions[i].scores[a]; });
  let score = Math.round((total / 20) * 100);
  score = Math.max(0, Math.min(100, score));
  let ri = score <= 30 ? 0 : score <= 45 ? 1 : score <= 60 ? 2 : score <= 75 ? 3 : 4;
  const r = results[ri % results.length];
  document.getElementById('qrType').textContent = r.type;
  document.getElementById('qrName').textContent = r.name;
  document.getElementById('qrDesc').textContent = r.desc;
  setTimeout(() => drawRadar('quickRadar', [65,55,70,60,50]), 200);
}

function showFullQuiz(){
  document.getElementById('quickResult').style.display = 'none';
  document.getElementById('quickResult').classList.remove('active');
  document.getElementById('fullQuizPage').classList.add('active');
  document.getElementById('fullQuizPage').style.display = 'block';
  fullCurrent = 0; fullAnswers = []; showFullQuestion();
}

function showFullQuestion(){
  if(fullCurrent >= 20){ showFullResult(); return; }
  const q = fullQuestions[fullCurrent];
  document.getElementById('fullQNum').textContent = fullCurrent + 6;
  document.getElementById('fullQText').textContent = q.q;
  document.getElementById('fullProgressFill').style.width = ((fullCurrent + 5) / 25 * 100) + '%';
  document.getElementById('fullProgressText').textContent = (fullCurrent + 6) + '/25';
  let html = '';
  q.opts.forEach((opt, i) => {
    const sel = (fullAnswers[fullCurrent] === i) ? ' selected' : '';
    html += `<button class="option${sel}" onclick="selectFull(${i})"><span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}</button>`;
  });
  document.getElementById('fullOptionsBox').innerHTML = html;
  document.getElementById('fullNextBtn').classList.add('hidden');
}

function selectFull(idx){
  fullAnswers[fullCurrent] = idx;
  document.querySelectorAll('#fullOptionsBox .option').forEach((el, i) => el.classList.toggle('selected', i === idx));
  document.getElementById('fullNextBtn').classList.remove('hidden');
}
function fullNextQuestion(){ fullCurrent++; showFullQuestion(); }

function showFullResult(){
  document.getElementById('fullQuizPage').style.display = 'none';
  document.getElementById('fullQuizPage').classList.remove('active');

  let dimScores = [0,0,0,0,0];
  fullAnswers.forEach((a, i) => {
    dimScores[Math.floor(i / 4)] += fullQuestions[i].scores[a];
  });
  let dimNorm = dimScores.map(s => Math.round((s / 16) * 100));
  
  // 统计A/B/C/D选项数量判定类型
  let counts = [0,0,0,0];
  fullAnswers.forEach(idx => counts[idx]++);
  let maxCount = Math.max(...counts);
  let topIndex = counts.indexOf(maxCount);
  
  // 映射到6种孤独类型
  let ri;
  if(topIndex === 0) ri = 0; // 人群孤独型
  else if(topIndex === 1) ri = 1; // 独处孤独型
  else if(topIndex === 2) {
    // 进一步判断
    let d3 = dimScores[2], d5 = dimScores[4];
    if(d5 <= 8 && d3 >= 6) ri = 3; // 失联孤独型
    else if(d5 >= 6 && d3 >= 8) ri = 4; // 成长孤独型
    else ri = 2; // 选择孤独型
  } else {
    let d2 = dimScores[1], d4 = dimScores[3];
    if(d2 >= 10) ri = 5; // 情绪孤独型
    else if(d4 >= 10) ri = 3; // 失联孤独型
    else ri = 2;
  }

  const r = results[ri];
  const finalScore = Math.round(dimScores.reduce((a,b) => a+b, 0) / 80 * 100);

  let pathText;
  if(ri === 0) pathText = "🌊 人群孤独型 → 你需要的不是更多人，而是更深的连接。试着在现有的关系里迈出一步——主动分享一个真实的想法，看看谁接得住。";
  else if(ri === 1) pathText = "🌙 独处孤独型 → 你需要学会和自己相处。试着把独处的时间变成「和自己的约会」——做一件让自己开心的事，而不是用社交逃避。";
  else if(ri === 2) pathText = "🏔️ 选择孤独型 → 你的孤独是清醒的，不需要改变。但你偶尔也可以允许自己「需要别人」——那不是软弱，是你和世界保持连接的开关。";
  else if(ri === 3) pathText = "💔 失联孤独型 → 你现在最需要的是一个「安全的人」。不一定是恋人，可以是一个能接住你情绪的朋友、一个咨询师，甚至是一本让你觉得自己被理解的书。";
  else if(ri === 4) pathText = "🌱 成长孤独型 → 孤独是你正在变好的证据。不要急着消除它，试着接纳它——你在成为更好的自己，而这段路注定是孤独的。给自己一点时间。";
  else pathText = "🧊 情绪孤独型 → 你需要一个「情绪容器」。可以是一个愿意听你倾诉的人、一本日记、或者一个创作出口。你的情绪需要被看见，而不是被隐藏。";

  const actions = [
    ["第1-30天：情绪日记", "每天花5分钟记录你的情绪状态，标注孤独感的强度和触发原因，找到自己的模式。"],
    ["第1-30天：建立连接", "主动联系一个你觉得安全的人，分享一件小事——不需要很深，但要让对方知道你在。"],
    ["第31-60天：自我陪伴练习", "每周安排一次「和自己的约会」——一个人散步、看电影、喝咖啡，练习享受独处。"],
    ["第61-90天：关系修复", "如果孤独源于断裂的关系，尝试给一个人发一条消息——不用解释太多，只是让对方知道你想起了TA。"]
  ];

  let html = `
    <div class="result-type">${r.type}</div>
    <div class="result-name">${r.name}</div>
    <div class="score">${r.label} · 孤独指数 ${finalScore}%</div>
    <div class="result-desc">${r.desc}</div>
    <div class="chart-box">
      <h4>📊 五维雷达图分析</h4>
      <div class="radar-container"><canvas id="fullRadar" width="280" height="280"></canvas></div>
    </div>
    <div class="path-box">
      <h4>🛤️ 你的孤独疗愈路径</h4>
      <p style="font-size:14px;color:#1A1A2E;line-height:1.8">${pathText}</p>
    </div>
    <div class="action-plan">
      <h4>📋 90天孤独疗愈计划</h4>
      ${actions.map((a, i) => `
        <div class="action-item">
          <div class="action-num">${i+1}</div>
          <div class="action-text"><strong>${a[0]}</strong><br>${a[1]}</div>
        </div>
      `).join('')}
    </div>
    <p style="font-size:13px;color:#7B1FA2;margin-top:16px">💡 孤独不是病，是信号<br>它在告诉你：你需要和自己连接，或者需要和别人连接</p>
  `;

  document.getElementById('fullResult').innerHTML = html;
  document.getElementById('fullResult').classList.add('active');
  document.getElementById('fullResult').style.display = 'block';
  setTimeout(() => drawRadar('fullRadar', dimNorm), 300);
}

function drawRadar(cid, data){
  const c = document.getElementById(cid);
  if(!c) return;
  const ctx = c.getContext('2d');
  const cx = c.width/2, cy = c.height/2, r = 100, sides = 5;
  ctx.clearRect(0, 0, c.width, c.height);
  
  for(let lv=1; lv<=5; lv++){
    ctx.beginPath();
    for(let i=0; i<sides; i++){
      const a = (Math.PI*2/sides)*i - Math.PI/2;
      const rr = (r/5)*lv;
      const x = cx + rr*Math.cos(a), y = cy + rr*Math.sin(a);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = '#CE93D8';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  for(let i=0; i<sides; i++){
    const a = (Math.PI*2/sides)*i - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r*Math.cos(a), cy + r*Math.sin(a));
    ctx.strokeStyle = '#CE93D8';
    ctx.stroke();
  }
  ctx.beginPath();
  for(let i=0; i<sides; i++){
    const a = (Math.PI*2/sides)*i - Math.PI/2;
    const rr = (data[i]/100)*r;
    const x = cx + rr*Math.cos(a), y = cy + rr*Math.sin(a);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(171,71,188,0.3)';
  ctx.fill();
  ctx.strokeStyle = '#AB47BC';
  ctx.lineWidth = 2;
  ctx.stroke();
  for(let i=0; i<sides; i++){
    const a = (Math.PI*2/sides)*i - Math.PI/2;
    const rr = (data[i]/100)*r;
    ctx.beginPath();
    ctx.arc(cx + rr*Math.cos(a), cy + rr*Math.sin(a), 5, 0, Math.PI*2);
    ctx.fillStyle = '#7B1FA2';
    ctx.fill();
  }
  ctx.fillStyle = '#1A1A2E';
  ctx.font = '12px -apple-system,sans-serif';
  ctx.textAlign = 'center';
  for(let i=0; i<sides; i++){
    const a = (Math.PI*2/sides)*i - Math.PI/2;
    ctx.fillText(dimNames[i], cx + (r+25)*Math.cos(a), cy + (r+25)*Math.sin(a) + 4);
  }
}
</script>
