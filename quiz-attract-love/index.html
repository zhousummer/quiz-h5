<body>
<div class="container">

<!-- 欢迎页 -->
<div id="welcome-page" class="welcome-page">
  <div class="card">
    <div class="logo">
      <h1>💙 你是吸渣体质还是被宠体质？</h1>
      <p>20 题完整版 · 情感模式诊断</p>
    </div>
    <div class="desc">

    <button class="btn btn-primary" onclick="startTest()">开始测试 →</button>
  </div>
</div>

<!-- 题目页 -->
<div id="question-page" class="question-page hidden">
  <div class="card">
    <div class="progress-text" id="progress-text">第 1/20 题</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:5%"></div></div>
    <div class="category-tag" id="category-tag">关系模式</div>
    <div class="question-text" id="question-text"></div>
    <ul class="option-list" id="option-list"></ul>
    <button class="btn btn-primary" id="next-btn" disabled onclick="nextQuestion()">下一题 →</button>
  </div>
</div>

<!-- 结果页 -->
<div id="result-page" class="result-page hidden">
  <div class="card">
    <div class="result-type">
      <div class="result-type-icon" id="result-icon"></div>
      <div class="result-type-name" id="result-name"></div>
      <div class="result-type-desc" id="result-desc"></div>
    </div>
  </div>
  <div class="card">
    <div class="score-section">
      <div class="score-label">情感模式评分</div>
      <div class="score-number" id="score-number"></div>
      <div class="score-bar"><div class="score-bar-fill" id="score-bar-fill"></div></div>
      <div style="font-size:12px;color:#949AA2" id="score-hint"></div>
    </div>
  </div>
  <div class="card">
    <h3 style="font-size:16px;color:#8EA1B4;margin-bottom:12px">📊 五维情感模式雷达图</h3>
    <div class="radar-chart" id="radar-chart"></div>
  </div>
  <div class="card">
    <div class="interpret-card">
      <h4>🔍 核心解读</h4>
      <p id="interpret-core"></p>
    </div>
    <div class="interpret-card">
      <h4>🧠 情感行为模式</h4>
      <p id="interpret-mechanism"></p>
    </div>
  </div>
  <div class="card">
    <h3 style="font-size:16px;color:#8EA1B4;margin-bottom:12px">🛤️ 吸渣体质 → 被宠体质 转变路径</h3>
    <div class="path-compare">
      <div class="path-card path-a"><h5 id="path-a-title">当下状态</h5><p id="path-a-desc"></p></div>
      <div class="path-card path-b"><h5 id="path-b-title">成长方向</h5><p id="path-b-desc"></p></div>
    </div>
  </div>
  <div class="card">
    <div class="action-plan">
      <h4>🌿 90 天情感成长行动方案</h4>
      <div id="action-steps"></div>
    </div>
  </div>
  <div class="card" style="text-align:center">
    <button class="btn btn-primary" onclick="restartTest()">🔄 重新测试</button>
    <button class="btn btn-share" onclick="shareResult()">📤 分享结果</button>
  </div>
</div>

</div>

<script>
const questions = [
  // 维度1：关系模式 (4题)
  { category: "关系模式", text: "你在感情中通常是什么样的角色？", options: ["照顾者，总是我在付出和迁就", "被照顾者，对方会主动关心我", "相互的，彼此付出也彼此接受", "还在摸索，每一段都不一样"] },
  { category: "关系模式", text: "分手后，你通常会怎么想？", options: ["是不是我哪里不够好", "缘分到了，各自安好", "复盘一下，学到什么", "没怎么想，向前看"] },
  { category: "关系模式", text: "看到朋友被伴侣宠着，你的第一反应是：", options: ["羡慕，觉得自己遇不到这样的人", "祝福，也觉得自己值得拥有", "好奇他们是怎么做到的", "觉得那是别人的生活，跟我没关系"] },
  { category: "关系模式", text: "当一段感情让你很累时，你会：", options: ["咬牙坚持，觉得总会好起来", "设定期限，到时间还累就放手", "主动沟通，看看能不能改善", "直接结束，不浪费彼此时间"] },
  // 维度2：边界感 (4题)
  { category: "边界感", text: "当对方做了让你不舒服的事，你会：", options: ["忍一忍，觉得说出来会破坏关系", "直接说出来，沟通清楚界限", "看事情大小，小事就过去了", "不知道怎么开口，会生闷气"] },
  { category: "边界感", text: "对方临时放你鸽子，你的反应是：", options: ["虽然不开心，但会说「没事」", "表达失望，要求下次提前沟通", "看理由是否充分再决定态度", "表面没事，心里默默扣分"] },
  { category: "边界感", text: "约会时，你会迁就对方的口味和喜好吗？", options: ["几乎总是迁就对方", "轮流决定，这次你下次我", "一起商量，找双方都喜欢的", "不迁就，各点各的"] },
  { category: "边界感", text: "对方频繁查看你手机，你会：", options: ["虽然不舒服但给他看，不想吵架", "明确拒绝，这是个人隐私", "先沟通为什么想看，再做决定", "反问他是不是不信任我"] },
  // 维度3：配得感 (4题)
  { category: "配得感", text: "有人对你好，你的第一反应是：", options: ["有点不好意思，想着怎么还回去", "开心接受，觉得自己值得被好好对待", "会开心，但也会观察对方是不是真心的", "有点警惕，怕对方有别的目的"] },
  { category: "配得感", text: "收到贵重的礼物，你的感受更接近：", options: ["压力很大，想着怎么回礼", "开心，觉得自己值得被宠爱", "感动，但也会有点不安", "先确认对方是不是真心"] },
  { category: "配得感", text: "有人说「你值得更好的」，你内心：", options: ["怀疑，觉得这是安慰的话", "认同，我知道自己值得", "不确定，有时候信有时候不信", "无所谓，不太在意这些"] },
  { category: "配得感", text: "想象一个完美伴侣站在你面前，你的感觉是：", options: ["觉得自己配不上对方", "觉得这是应该的，我值得", "有点紧张，但愿意试试", "先看看对方是不是真的那么好"] },
  // 维度4：吸引力 (4题)
  { category: "吸引力", text: "回顾过往的感情经历，你发现：", options: ["总是被同一类人吸引，结果也差不多", "遇到的人越来越好，关系越来越健康", "有好有坏，说不准什么规律", "感情经历不多，还在了解自己"] },
  { category: "吸引力", text: "你觉得什么样的人最容易吸引你？", options: ["有点「坏坏的」、需要我照顾的人", "温柔可靠、让人有安全感的人", "有趣有才华、能聊到一起的人", "还不确定，每段都不一样"] },

  { category: "吸引力", text: "你相信「吸引力法则」吗？", options: ["不太信，我觉得自己运气不好", "相信，我吸引的都是和我匹配的", "半信半疑，有时候准有时候不准", "没想过这个问题"] },
  // 维度5：自我认知 (4题)
  { category: "自我认知", text: "如果用一个词形容你的情感状态，更接近：", options: ["总是疲惫——爱得很累", "安稳满足——被爱包围", "忽上忽下——像过山车", "还在学习——在成长中"] },

    mechanism: "你的行为模式有三大特征：低边界感（不敢拒绝、不敢表达不满）、低配得感（觉得被爱需要「赚取」而非理所当然）、重复吸引（潜意识被熟悉的模式吸引，即便它不健康）。好消息是，这些都是可以改变的。",
    pathA: { title: "吸渣模式", desc: "习惯性付出→不被珍惜→自我怀疑→更加付出，这是一个循环。打破它需要从「敢于拒绝」开始。" },
    pathB: { title: "被宠方向", desc: "建立清晰边界→提升配得感→吸引健康的人→进入良性循环。改变从「学会爱自己」开始。" },
    actions: [
      "第1-14天：记录每次「想说不敢说」的瞬间，练习在安全场合表达真实感受",
      "第15-30天：列出「我值得被爱的10个理由」，每天读一遍，建立配得感",
      "第31-60天：审视过往3段关系的共同模式，找出自己的「吸引陷阱」",

  cherished: {
    icon: "💝",
    name: "被宠体质",
    desc: "你的情感模式是「被宠体质」——自信、有边界、懂得筛选，自带幸福吸引力",

  mixed: {
    icon: "🔄",
    name: "混合体质",

    name: "成长体质",
    desc: "你的情感模式是「成长体质」——正在学习爱自己，每一步都在靠近更好的状态",
    core: "你的情感模式是「成长体质」。你可能感情经历不多，或者正在从一段消耗中恢复。这不是缺点——而是你正处于最有潜力的阶段。你像一块海绵，正在吸收关于爱和自我的认知，每一步都在靠近更好的状态。",
    mechanism: "你的行为模式还处于「学习和重塑期」——你还没有固化的「吸渣」或「被宠」模式，这意味着你有最大的可塑性。现在的关键是：在建立情感认知的阶段，用正确的输入来塑造未来的自己。",
    pathA: { title: "自我探索", desc: "先不急着进入关系，花时间了解自己的需求、边界和价值观。最好的关系从最好的自己开始。" },
    pathB: { title: "安全实践", desc: "在安全的关系中（友谊、家庭）练习表达边界和需求，积累被尊重对待的正面经验。" },
    actions: [
      "第1-14天：写下「我想要什么样的感情」——不是对方什么样，而是你希望被怎样对待",
      "第15-30天：阅读1-2本关于情感边界和配得感的书，建立知识框架",
      "第31-60天：在友谊中练习表达真实感受——从不重要的小事开始",
      "第61-90天：参加社交活动，以「交朋友」而非「找对象」的心态接触新人，练习筛选"
    ]
  }
};

let currentQuestion = 0;
let answers = [];
let scores = { "关系模式": 0, "边界感": 0, "配得感": 0, "吸引力": 0, "自我认知": 0 };

function startTest() {
  document.getElementById('welcome-page').classList.add('hidden');
  document.getElementById('question-page').classList.remove('hidden');
  document.getElementById('question-page').classList.add('fade-in');
  currentQuestion = 0;
  answers = [];
  scores = { "关系模式": 0, "边界感": 0, "配得感": 0, "吸引力": 0, "自我认知": 0 };
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('progress-text').textContent = `第 ${currentQuestion + 1}/20 题`;
  document.getElementById('progress-fill').style.width = `${(currentQuestion + 1) / 20 * 100}%`;
  document.getElementById('category-tag').textContent = q.category;
  document.getElementById('question-text').textContent = q.text;
  const optionList = document.getElementById('option-list');
  optionList.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const li = document.createElement('li');
    li.className = 'option-item';
    li.innerHTML = `<span class="option-label">${labels[i]}.</span> ${opt}`;
    li.onclick = () => selectOption(i, li);
    optionList.appendChild(li);
  });
  document.getElementById('next-btn').disabled = true;
  document.getElementById('next-btn').textContent = currentQuestion < 19 ? '下一题 →' : '查看结果 ✨';
}

function selectOption(index, element) {
  document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
  element.classList.add('selected');
  document.getElementById('next-btn').disabled = false;
  element.dataset.selectedIndex = index;
}

function nextQuestion() {
  const selected = document.querySelector('.option-item.selected');
  if (!selected) return;
  const idx = parseInt(selected.dataset.selectedIndex);
  answers.push(idx);
  
  // 计分：A=1(低边界/低配得), B=4(高边界/高配得), C=3, D=2
  const q = questions[currentQuestion];
  const scoreMap = { 0: 1, 1: 4, 2: 3, 3: 2 };
  scores[q.category] += scoreMap[idx];
  
  currentQuestion++;
  if (currentQuestion < 20) {
    showQuestion();
    document.getElementById('question-page').classList.remove('fade-in');
    void document.getElementById('question-page').offsetWidth;
    document.getElementById('question-page').classList.add('fade-in');
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('question-page').classList.add('hidden');
  document.getElementById('result-page').classList.remove('hidden');
  document.getElementById('result-page').classList.add('fade-in');

  // 计算总分和类型
  const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
  const maxScore = 80; // 20题 × 4分
  const percentage = Math.round(totalScore / maxScore * 100);
  
  let resultKey;
  if (percentage >= 65) resultKey = 'cherished';
  else if (percentage >= 45) resultKey = 'mixed';
  else if (percentage >= 25) resultKey = 'growing';
  else resultKey = 'victim';
  
  const result = resultTypes[resultKey];
  
  // 显示结果
  document.getElementById('result-icon').textContent = result.icon;
  document.getElementById('result-name').textContent = result.name;
  document.getElementById('result-desc').textContent = result.desc;
  document.getElementById('score-number').textContent = percentage + '%';
  document.getElementById('score-bar-fill').style.width = percentage + '%';
  
  const hints = { victim: '偏低——但这不是坏事，说明你有巨大的成长空间', cherished: '很高——你已经是情感磁场的主角', mixed: '中等——你的状态有波动，正在稳定中', growing: '发展中——你正处于最有潜力的阶段' };
  document.getElementById('score-hint').textContent = hints[resultKey];
  
  document.getElementById('interpret-core').textContent = result.core;
  document.getElementById('interpret-mechanism').textContent = result.mechanism;
  document.getElementById('path-a-title').textContent = result.pathA.title;
  document.getElementById('path-a-desc').textContent = result.pathA.desc;
  document.getElementById('path-b-title').textContent = result.pathB.title;
  document.getElementById('path-b-desc').textContent = result.pathB.desc;
  
  const stepsDiv = document.getElementById('action-steps');
  stepsDiv.innerHTML = result.actions.map((a, i) => 
    `<div class="action-step"><span class="step-num">${i+1}</span>${a}</div>`
  ).join('');
  
  // 雷达图
  drawRadar();
}

function drawRadar() {
  const container = document.getElementById('radar-chart');
  const dims = ["关系模式", "边界感", "配得感", "吸引力", "自我认知"];
  const maxDimScore = 16; // 4题 × 4分
  const center = 120, radius = 95;
  
  let svg = `<svg class="radar-svg" viewBox="0 0 240 240">`;
  
  // 网格
  for (let level = 1; level <= 4; level++) {
    let pts = [];
    for (let i = 0; i < 5; i++) {
      const angle = Math.PI * 2 * i / 5 - Math.PI / 2;
      const r = radius * level / 4;
      pts.push(`${center + r * Math.cos(angle)},${center + r * Math.sin(angle)}`);
    }
    svg += `<polygon points="${pts.join(' ')}" fill="none" stroke="#C3CFD9" stroke-width="1" opacity="0.6"/>`;
  }
  
  // 轴线
  for (let i = 0; i < 5; i++) {
    const angle = Math.PI * 2 * i / 5 - Math.PI / 2;
    svg += `<line x1="${center}" y1="${center}" x2="${center + radius * Math.cos(angle)}" y2="${center + radius * Math.sin(angle)}" stroke="#C3CFD9" stroke-width="1"/>`;
  }
  
  // 数据多边形
  let dataPts = [];
  for (let i = 0; i < 5; i++) {
    const angle = Math.PI * 2 * i / 5 - Math.PI / 2;
    const r = radius * Math.min(scores[dims[i]] / maxDimScore, 1);
    dataPts.push(`${center + r * Math.cos(angle)},${center + r * Math.sin(angle)}`);
  }
  svg += `<polygon points="${dataPts.join(' ')}" fill="rgba(142,161,180,0.25)" stroke="#8EA1B4" stroke-width="2"/>`;
  
  // 数据点
  for (let i = 0; i < 5; i++) {
    const angle = Math.PI * 2 * i / 5 - Math.PI / 2;
    const r = radius * Math.min(scores[dims[i]] / maxDimScore, 1);
    svg += `<circle cx="${center + r * Math.cos(angle)}" cy="${center + r * Math.sin(angle)}" r="4" fill="#8EA1B4"/>`;
  }
  
  // 标签
  for (let i = 0; i < 5; i++) {
    const angle = Math.PI * 2 * i / 5 - Math.PI / 2;
    const labelR = radius + 22;
    const x = center + labelR * Math.cos(angle);
    const y = center + labelR * Math.sin(angle);
    const anchor = Math.abs(x - center) < 20 ? 'middle' : (x < center ? 'end' : 'start');
    svg += `<text x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="middle" font-size="11" fill="#646A73">${dims[i]}</text>`;
  }
  
  svg += '</svg>';
  container.innerHTML = svg;
}

function restartTest() {
  document.getElementById('result-page').classList.add('hidden');
  document.getElementById('welcome-page').classList.remove('hidden');
  currentQuestion = 0;
  answers = [];
  scores = { "关系模式": 0, "边界感": 0, "配得感": 0, "吸引力": 0, "自我认知": 0 };
}

function shareResult() {
  const name = document.getElementById('result-name').textContent;
  const desc = document.getElementById('result-desc').textContent;
  const text = `测了「你是吸渣体质还是被宠体质」：${name} - ${desc}`;
  if (navigator.share) {
    navigator.share({ title: '你是吸渣体质还是被宠体质？', text: text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('结果已复制，粘贴分享给朋友吧！'));
  }
}
</script>
