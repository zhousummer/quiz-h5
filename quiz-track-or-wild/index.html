<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>你适合轨道人生还是旷野人生 - 20题完整版人生路径测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#FFFDE7;min-height:100vh;color:#E65100}
.container{max-width:500px;margin:0 auto;padding:20px}
.welcome{text-align:center;padding-top:50px}
.welcome .emoji-top{font-size:64px;margin-bottom:16px}
.welcome h1{font-size:30px;color:#F57F17;margin-bottom:10px;line-height:1.4}
.welcome .subtitle{font-size:15px;color:#FF8F00;margin-bottom:28px;line-height:1.6}
.welcome .dims{text-align:left;margin-bottom:36px;background:white;border-radius:20px;padding:20px 24px;box-shadow:0 4px 20px rgba(255,213,79,0.15)}
.welcome .dim-item{display:flex;align-items:center;gap:12px;padding:9px 0;font-size:15px;color:#FF8F00}
.welcome .dim-item .dot{width:8px;height:8px;border-radius:50%;background:#FFD54F;flex-shrink:0}
.btn{display:inline-block;padding:16px 60px;background:linear-gradient(135deg,#FFD54F,#FFB300);color:white;font-size:20px;font-weight:bold;border:none;border-radius:40px;cursor:pointer;text-decoration:none;box-shadow:0 6px 24px rgba(255,213,79,0.4);transition:all 0.3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,213,79,0.5)}
.btn:active{transform:translateY(0)}
.btn-small{padding:12px 40px;font-size:16px}
.quiz-page{display:none}.quiz-page.active{display:block}
.progress-bar{width:100%;height:8px;background:#E0E0E0;border-radius:4px;margin-bottom:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#FFD54F,#FFB300);border-radius:4px;transition:width 0.4s ease}
.progress-text{text-align:center;font-size:14px;color:#FF8F00;margin-bottom:28px}
.question{margin-bottom:26px}
.question .q-num{display:inline-block;width:36px;height:36px;line-height:36px;text-align:center;background:#FFD54F;color:white;border-radius:50%;font-weight:bold;font-size:16px;margin-right:10px;vertical-align:middle}
.question h3{display:inline;font-size:20px;color:#F57F17;line-height:1.5}
.options{margin-top:18px}
.option{display:block;width:100%;padding:18px 20px;margin-bottom:12px;background:white;border:2px solid #FFF8E1;border-radius:16px;font-size:16px;color:#E65100;text-align:left;cursor:pointer;transition:all 0.3s}
.option:hover{border-color:#FFD54F;background:#FFFDE7}
.option.selected{border-color:#FFD54F;background:#FFFDE7;box-shadow:0 2px 12px rgba(255,213,79,0.2)}
.option .opt-label{display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;background:#FFD54F;color:white;border-radius:50%;font-weight:bold;font-size:14px;margin-right:12px}
.quick-result{display:none;text-align:center;padding-top:30px}
.quick-result.active{display:block}
.quick-result .result-type{font-size:52px;margin-bottom:8px}
.quick-result .result-name{font-size:28px;font-weight:bold;color:#F57F17;margin-bottom:10px}
.quick-result .result-desc{font-size:15px;color:#FF8F00;margin-bottom:28px;line-height:1.6}
.quick-result .result-chart{margin:16px auto;max-width:280px}
.quick-result .upgrade-box{background:white;border-radius:20px;padding:28px 20px;margin-top:28px;box-shadow:0 4px 20px rgba(255,213,79,0.15)}
.quick-result .upgrade-box h4{font-size:20px;color:#F57F17;margin-bottom:12px}
.quick-result .upgrade-box p{font-size:14px;color:#FF8F00;margin-bottom:20px;line-height:1.6}
.full-result{display:none;text-align:center;padding-top:24px}
.full-result.active{display:block}
.full-result .result-type{font-size:60px;margin-bottom:8px}
.full-result .result-name{font-size:32px;font-weight:bold;color:#F57F17;margin-bottom:8px}
.full-result .score{display:inline-block;padding:8px 24px;background:#FFFDE7;border-radius:20px;font-size:16px;color:#FF8F00;margin-bottom:20px}
.full-result .result-desc{font-size:15px;color:#E65100;line-height:1.8;text-align:left;margin-bottom:20px;padding:20px;background:white;border-radius:16px}
.full-result .chart-box{background:white;border-radius:20px;padding:20px;margin:20px 0;box-shadow:0 4px 20px rgba(255,213,79,0.15)}
.full-result .chart-box h4{font-size:18px;color:#F57F17;margin-bottom:14px}
.full-result .radar-container{width:280px;height:280px;margin:0 auto}
.full-result .action-plan{text-align:left;background:white;border-radius:16px;padding:20px;margin:20px 0}
.full-result .action-plan h4{font-size:18px;color:#F57F17;margin-bottom:16px;text-align:center}
.full-result .action-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #FFFDE7}
.full-result .action-item:last-child{border-bottom:none}
.full-result .action-num{width:28px;height:28px;line-height:28px;text-align:center;background:#FFD54F;color:white;border-radius:50%;font-weight:bold;font-size:14px;flex-shrink:0}
.full-result .action-text{font-size:14px;color:#E65100;line-height:1.6}
.full-result .path-box{text-align:left;background:white;border-radius:16px;padding:20px;margin:20px 0}
.full-result .path-box h4{font-size:18px;color:#F57F17;margin-bottom:14px;text-align:center}
.hidden{display:none}
</style>
</head>
<body>
<div class="container" id="app">

<div class="welcome" id="welcome">
  <div class="emoji-top">☀️</div>
  <h1>你适合轨道人生还是旷野人生</h1>
  <p class="subtitle">20题深度扫描你的人生路径密码</p>
  <div class="dims">
    <div class="dim-item"><span class="dot"></span> 规划力 —— 你有多擅长制定和执行人生规划？</div>
    <div class="dim-item"><span class="dot"></span> 冒险欲 —— 你有多渴望打破常规探索未知？</div>
    <div class="dim-item"><span class="dot"></span> 确定性偏好 —— 你有多需要人生有明确方向？</div>
    <div class="dim-item"><span class="dot"></span> 自由向往 —— 你有多向往不受束缚的自由人生？</div>
    <div class="dim-item"><span class="dot"></span> 抗乱能力 —— 你在混乱和不确定中能否找到方向？</div>
  </div>
  <button class="btn" onclick="startQuiz()">开始测试</button>
</div>

<div class="quiz-page" id="quizPage">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">1/5</div>
  <div class="question"><span class="q-num" id="qNum">1</span><h3 id="qText"></h3></div>
  <div class="options" id="optionsBox"></div>
  <button class="btn btn-small hidden" id="nextBtn" onclick="nextQuestion()">下一题</button>
</div>

<div class="quick-result" id="quickResult">
  <div class="result-type" id="qrType"></div>
  <div class="result-name" id="qrName"></div>
  <div class="result-desc" id="qrDesc"></div>
  <div class="result-chart"><canvas id="quickRadar" width="260" height="260"></canvas></div>
  <div class="upgrade-box">
    <h4>🎯 以上只是5题快速版</h4>
    <p>完成全部20题，你将获得：<br>
    ✅ 精确的旷野指数评分<br>
    ✅ 五维雷达图深度分析<br>
    ✅ 你的人生路径转变方向<br>
    ✅ 90天人生路径优化计划</p>
    <button class="btn" onclick="showFullQuiz()">解锁完整20题测试</button>
  </div>
</div>

<div class="quiz-page" id="fullQuizPage">
  <div class="progress-bar"><div class="progress-fill" id="fullProgressFill"></div></div>
  <div class="progress-text" id="fullProgressText">6/25</div>
  <div class="question"><span class="q-num" id="fullQNum">6</span><h3 id="fullQText"></h3></div>
  <div class="options" id="fullOptionsBox"></div>
  <button class="btn btn-small hidden" id="fullNextBtn" onclick="fullNextQuestion()">下一题</button>
</div>

<div class="full-result" id="fullResult"></div>

</div>

<script>
const quickQuestions=[
  {q:"你对未来5年的规划态度是？",opts:["有清晰的路线图和阶段性目标","不太做长远规划，走一步看一步","有方向但路径灵活可调整","还在迷茫，不确定自己想要什么"],scores:[1,4,3,2]},
  {q:"面对人生重大选择时，你更依赖？",opts:["理性分析和既定规划的指引","直觉和当下的感受","分析+直觉结合，但保留弹性","会纠结很久，很难做决定"],scores:[1,4,3,2]},
  {q:"你对「稳定」和「自由」的偏好？",opts:["稳定更重要，自由要在稳定的基础上","自由最重要，稳定太无聊","两者都要，稳定保底+自由探索","还没想清楚哪个更重要"],scores:[1,4,3,2]},
  {q:"你更认同哪种人生比喻？",opts:["人生是一条轨道，按规划稳步前行","人生是一片旷野，充满无限可能","人生是轨道+旷野，先积累再出发","还在寻找自己的人生比喻"],scores:[1,4,3,2]},
  {q:"你最害怕的事是？",opts:["偏离轨道、失去确定性","被困在轨道上、失去自由","轨道和旷野都走不好","不知道自己要走哪条路"],scores:[1,4,3,2]}
];

const fullQuestions=[
  // 维度1: 规划力 (6-9)
  {q:"你做人生决策时最看重什么？",opts:["这个选择是否符合我的长期规划","这个选择是否让我感到兴奋和期待","这个选择是否同时兼顾规划和可能性","还没形成自己的决策标准"],scores:[1,4,3,2]},
  {q:"你对「人生规划」的态度？",opts:["非常重要，没有规划我会焦虑","不太重要，人生太短要活在当下","有规划但不死守，随时可以调整","想规划但不知道怎么规划"],scores:[1,4,3,2]},
  {q:"你更习惯哪种生活节奏？",opts:["按计划行事，日程表是我的安全网","随心所欲，不喜欢被任何计划束缚","有节奏但留出弹性空间","总是计划好了又推翻重来"],scores:[1,4,3,2]},
  {q:"你对自己的职业/人生方向有多确定？",opts:["非常确定，我知道3年/5年/10年后在哪","不太确定，但觉得不确定性更有趣","有大方向但具体路径可能随时变","很不确定，经常迷茫"],scores:[1,4,3,2]},
  // 维度2: 冒险欲 (10-13)
  {q:"有人说「人生应该多尝试不同的可能性」，你？",opts:["不完全认同，试错成本太高","完全认同，人生就是一场冒险","认同但要先有保底再去试","想尝试但总不敢行动"],scores:[1,4,3,2]},
  {q:"看到一个全新的可能性（如新行业/新城市/新生活方式），你？",opts:["先评估风险和可行性再决定","很心动，想立刻尝试","评估后如果风险可控就想试","心动但总是犹豫不敢迈步"],scores:[1,4,3,2]},
  {q:"你对「试错」的态度？",opts:["尽量减少试错，人生要走最优路径","试错本身就是人生的价值","小范围试错+大方向规划","想试错但怕犯错"],scores:[1,4,3,2]},
  {q:"你最向往的生活场景是？",opts:["在一个领域深耕成为专家","不断切换体验不同的生活方式","有主业同时探索多个可能性","不知道哪种场景更向往"],scores:[1,4,3,2]},
  // 维度3: 确定性偏好 (14-17)
  {q:"你对「不确定性」的感受？",opts:["不喜欢，确定性让我安心","很享受，不确定性让人生有趣","可以接受适度的不确定性","不确定性让我很焦虑"],scores:[1,4,3,2]},
  {q:"你选择工作/生活方向时更看重？",opts:["确定性——知道3年后还在做什么","可能性——未来充满未知才有趣","既有确定性也有成长空间","不知道该看重什么"],scores:[1,4,3,2]},
  {q:"你对「人生轨道」（按既定路径走）的看法？",opts:["很认同，轨道给我安全感","不认同，轨道是牢笼","先走一段轨道积累再脱离","觉得轨道安全但不确定想不想走"],scores:[1,4,3,2]},
  {q:"你更害怕哪种状态？",opts:["人生失去方向变成一片迷雾","被困在一个不喜欢的轨道上","轨道和旷野都走不好","不知道自己害怕哪种"],scores:[1,4,3,2]},
  // 维度4: 自由向往 (18-21)
  {q:"你对「自由」的定义？",opts:["在有规划的基础上的选择自由","不受任何束缚的绝对自由","稳定保障下的探索自由","还没定义清楚什么是自由"],scores:[1,4,3,2]},
  {q:"你更想成为什么样的人？",opts:["一个在某个领域很厉害的专家","一个什么都体验过的冒险家","一个既专业又有趣的斜杠青年","不知道想成为什么样的人"],scores:[1,4,3,2]},
  {q:"你觉得哪种人活得更值？",opts:["按规划一步步实现目标的人","尽情体验人生各种可能性的人","两者结合的人","还没想清楚"],scores:[1,4,3,2]},
  {q:"如果完全自由没有任何约束，你会？",opts:["还是会给自己制定一个规划","立刻出发去体验一切","先做必须做的事再去探索","可能什么都做不了"],scores:[1,4,3,2]},
  // 维度5: 抗乱能力 (22-25)
  {q:"生活突然被打乱（如失业/搬家/关系变化），你？",opts:["尽快重新建立秩序和新规划","趁机重新出发尝试新可能性","先稳住基本盘再找新方向","会很崩溃需要很久恢复"],scores:[1,4,3,2]},
  {q:"你在混乱中能否找到方向？",opts:["很难，我需要秩序才能思考","反而更清晰，混乱激发了我的灵感","需要先恢复基本秩序再找方向","混乱中完全找不到方向"],scores:[1,4,3,2]},
  {q:"你对「人生没有标准答案」这句话？",opts:["不太认同，我需要标准答案","完全认同，人生就是自定义","部分认同，有些事有答案有些没有","这句话让我更焦虑"],scores:[1,4,3,2]},
  {q:"你觉得最理想的人生是？",opts:["按规划稳步实现每一个目标","每一天都有新的发现和体验","有根基也有翅膀","还在寻找我的人生理想"],scores:[1,4,3,2]}
];

const results=[
  {type:"🛤️",name:"轨道安稳型",desc:"你是天生适合轨道的人。规划、确定性、稳步前行——这些不是你的枷锁，而是你的能量来源。在轨道上你才能发挥最大价值，偏离轨道反而会让你迷茫和焦虑。不是你不够勇敢，而是你更清楚自己在秩序中才能走得最远。",scoreLabel:"旷野指数",scoreRange:"0-30",scoreDesc:"更适合轨道型人生"},
  {type:"🌿",name:"旷野探索型",desc:"你的灵魂天生属于旷野。固定的路径让你窒息，不确定性和可能性才是你的养分。你不是不靠谱——你只是更相信人生没有标准路径，每一种体验都在丰富你的地图。旷野人生不是逃避，而是你主动选择的冒险。",scoreLabel:"旷野指数",scoreRange:"70-100",scoreDesc:"更适合旷野型人生"},
  {type:"☀️",name:"轨道+旷野型",desc:"你既需要轨道的安全感又渴望旷野的自由——你不是极端的轨道派或旷野派，而是那个懂得「先积累再出发」的人。在轨道上积累实力和资源，然后带着底气走进旷野探索。轨道是根，旷野是翼。",scoreLabel:"旷野指数",scoreRange:"40-60",scoreDesc:"适配轨道+旷野混合型"},
  {type:"🧭",name:"寻找方向型",desc:"你还在摸索最适合自己的那条路——也许在轨道上渴望旷野，也许在旷野中怀念轨道。这很正常，很多人需要通过试错才能找到真正的人生路径。你已经在寻找了，这本身就是一种勇敢。",scoreLabel:"旷野指数",scoreRange:"30-50",scoreDesc:"仍在寻找人生方向"}
];

const dimNames=["规划力","冒险欲","确定性偏好","自由向往","抗乱能力"];

let quickAnswers=[],quickCurrent=0,fullAnswers=[],fullCurrent=0;

function startQuiz(){
  document.getElementById('welcome').style.display='none';
  document.getElementById('quizPage').classList.add('active');
  document.getElementById('quizPage').style.display='block';
  quickCurrent=0;quickAnswers=[];showQuickQuestion();
}

function showQuickQuestion(){
  if(quickCurrent>=5){showQuickResult();return}
  const q=quickQuestions[quickCurrent];
  document.getElementById('qNum').textContent=quickCurrent+1;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('progressFill').style.width=(quickCurrent/5*100)+'%';
  document.getElementById('progressText').textContent=(quickCurrent+1)+'/5';
  let html='';
  q.opts.forEach((opt,i)=>{
    const sel=quickAnswers[quickCurrent]===i?' selected':'';
    html+=`<button class="option${sel}" onclick="selectQuick(${i})"><span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}</button>`;
  });
  document.getElementById('optionsBox').innerHTML=html;
  document.getElementById('nextBtn').classList.add('hidden');
}

function selectQuick(idx){
  quickAnswers[quickCurrent]=idx;
  document.querySelectorAll('.option').forEach((el,i)=>el.classList.toggle('selected',i===idx));
  document.getElementById('nextBtn').classList.remove('hidden');
}
function nextQuestion(){quickCurrent++;showQuickQuestion()}

function showQuickResult(){
  document.getElementById('quizPage').style.display='none';
  document.getElementById('quizPage').classList.remove('active');
  document.getElementById('quickResult').classList.add('active');
  document.getElementById('quickResult').style.display='block';
  let total=0;
  quickAnswers.forEach((a,i)=>{total+=quickQuestions[i].scores[a]});
  let score=Math.round(total/20*100);
  score=Math.max(0,Math.min(100,score));
  let ri=score<=30?0:score>=70?1:score>=50?2:3;
  const r=results[ri];
  document.getElementById('qrType').textContent=r.type;
  document.getElementById('qrName').textContent=r.name;
  document.getElementById('qrDesc').textContent=r.desc;
  setTimeout(()=>drawRadar('quickRadar',[70,40,80,30,50]),200);
}

function showFullQuiz(){
  document.getElementById('quickResult').style.display='none';
  document.getElementById('quickResult').classList.remove('active');
  document.getElementById('fullQuizPage').classList.add('active');
  document.getElementById('fullQuizPage').style.display='block';
  fullCurrent=0;fullAnswers=[];showFullQuestion();
}

function showFullQuestion(){
  if(fullCurrent>=20){showFullResult();return}
  const q=fullQuestions[fullCurrent];
  document.getElementById('fullQNum').textContent=fullCurrent+6;
  document.getElementById('fullQText').textContent=q.q;
  document.getElementById('fullProgressFill').style.width=((fullCurrent+5)/25*100)+'%';
  document.getElementById('fullProgressText').textContent=(fullCurrent+6)+'/25';
  let html='';
  q.opts.forEach((opt,i)=>{
    const sel=fullAnswers[fullCurrent]===i?' selected':'';
    html+=`<button class="option${sel}" onclick="selectFull(${i})"><span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}</button>`;
  });
  document.getElementById('fullOptionsBox').innerHTML=html;
  document.getElementById('fullNextBtn').classList.add('hidden');
}

function selectFull(idx){
  fullAnswers[fullCurrent]=idx;
  document.querySelectorAll('#fullOptionsBox .option').forEach((el,i)=>el.classList.toggle('selected',i===idx));
  document.getElementById('fullNextBtn').classList.remove('hidden');
}
function fullNextQuestion(){fullCurrent++;showFullQuestion()}

function showFullResult(){
  document.getElementById('fullQuizPage').style.display='none';
  document.getElementById('fullQuizPage').classList.remove('active');
  let dimScores=[0,0,0,0,0];
  fullAnswers.forEach((a,i)=>{dimScores[Math.floor(i/4)]+=fullQuestions[i].scores[a]});
  let dimNorm=dimScores.map(s=>Math.round(s/16*100));
  // 旷野指数 = 冒险欲+自由向往+抗乱能力 - 规划力-确定性偏好
  let wildIdx=(dimScores[1]+dimScores[3]+dimScores[4])-(dimScores[0]+dimScores[2]);
  let finalScore=Math.round(wildIdx/24*100+50);
  finalScore=Math.max(0,Math.min(100,finalScore));
  let ri=finalScore<=30?0:finalScore>=70?1:finalScore>=50?2:3;
  const r=results[ri];

  let pathText;
  if(ri===0)pathText="🛤️ 轨道安稳型 → 深耕轨道：你已经找到了适合的路径，在轨道上持续精进——规划力+确定性=你的幸福密码。偶尔加一点新体验，但不要偏离轨道太远。";
  else if(ri===1)pathText="🌿 旷野探索型 → 拥抱未知：你的灵魂需要旷野，建立「最小安全底座+最大探索空间」——1份保底+N份冒险，让你既有底气又有自由。";
  else if(ri===2)pathText="☀️ 轨道+旷野型 → 优化切换：先在轨道上积累3-5年实力和资源，然后带着底气走进旷野——轨道是根，旷野是翼，两者不矛盾。";
  else pathText="🧭 寻找方向型 → 小步试错：先用3个月尝试一种新模式（轨道深耕or旷野冒险），再决定要不要更大改变——不急，慢慢找到属于你的路。";

  const actions=[
    ["第1-30天：路径盘点","回顾过去3年的人生轨迹，找出让你最满足和最焦虑的时刻，明确你是轨道型还是旷野型"],
    ["第1-30天：路径实验","根据你的类型做一个小实验——轨道型尝试一次小冒险、旷野型尝试一周规律生活、混合型优化切换节奏、迷茫型先试3个月轨道"],
    ["第31-60天：路径强化","强化你的主路径——轨道型深化规划执行力、旷野型建立最小安全底座、混合型找到轨道→旷野切换信号、迷茫型选定一条路走2周"],
    ["第61-90天：路径定调","复盘30+60天的变化，确定你的人生路径关键词，写出「我的人生路径宣言」"]
  ];

  let html=`
    <div class="result-type">${r.type}</div>
    <div class="result-name">${r.name}</div>
    <div class="score">${r.scoreLabel}：${finalScore}分 · ${r.scoreDesc}</div>
    <div class="result-desc">${r.desc}</div>
    <div class="chart-box">
      <h4>📊 五维雷达图分析</h4>
      <div class="radar-container"><canvas id="fullRadar" width="280" height="280"></canvas></div>
    </div>
    <div class="path-box">
      <h4>🛤️ 你的人生路径方向</h4>
      <p style="font-size:14px;color:#E65100;line-height:1.8">${pathText}</p>
    </div>
    <div class="action-plan">
      <h4>📋 90天人生路径优化计划</h4>
      ${actions.map((a,i)=>`
        <div class="action-item">
          <div class="action-num">${i+1}</div>
          <div class="action-text"><strong>${a[0]}</strong><br>${a[1]}</div>
        </div>`).join('')}
    </div>
    <p style="font-size:13px;color:#FF8F00;margin-top:16px">💡 轨道和旷野不是对立的——找到让你能量最高的路径才是关键<br>人生没有标准路径，只有最适合你的路径</p>
  `;

  document.getElementById('fullResult').innerHTML=html;
  document.getElementById('fullResult').classList.add('active');
  document.getElementById('fullResult').style.display='block';
  setTimeout(()=>drawRadar('fullRadar',dimNorm),300);
}

function drawRadar(cid,data){
  const c=document.getElementById(cid);
  if(!c)return;
  const ctx=c.getContext('2d'),cx=c.width/2,cy=c.height/2,r=100,sides=5;
  ctx.clearRect(0,0,c.width,c.height);
  for(let lv=1;lv<=5;lv++){
    ctx.beginPath();
    for(let i=0;i<sides;i++){
      const a=(Math.PI*2/sides)*i-Math.PI/2;
      const rr=(r/5)*lv;
      const x=cx+rr*Math.cos(a),y=cy+rr*Math.sin(a);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.strokeStyle='#E0E0E0';ctx.lineWidth=1;ctx.stroke();
  }
  for(let i=0;i<sides;i++){
    const a=(Math.PI*2/sides)*i-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.strokeStyle='#E0E0E0';ctx.stroke();
  }
  ctx.beginPath();
  for(let i=0;i<sides;i++){
    const a=(Math.PI*2/sides)*i-Math.PI/2;
    const rr=(data[i]/100)*r;
    const x=cx+rr*Math.cos(a),y=cy+rr*Math.sin(a);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();ctx.fillStyle='rgba(255,213,79,0.3)';ctx.fill();ctx.strokeStyle='#FFD54F';ctx.lineWidth=2;ctx.stroke();
  for(let i=0;i<sides;i++){
    const a=(Math.PI*2/sides)*i-Math.PI/2;
    const rr=(data[i]/100)*r;
    ctx.beginPath();ctx.arc(cx+rr*Math.cos(a),cy+rr*Math.sin(a),5,0,Math.PI*2);ctx.fillStyle='#FFB300';ctx.fill();
  }
  ctx.fillStyle='#E65100';ctx.font='12px -apple-system,sans-serif';ctx.textAlign='center';
  for(let i=0;i<sides;i++){
    const a=(Math.PI*2/sides)*i-Math.PI/2;
    ctx.fillText(dimNames[i],cx+(r+25)*Math.cos(a),cy+(r+25)*Math.sin(a)+4);
  }
}
</script>
