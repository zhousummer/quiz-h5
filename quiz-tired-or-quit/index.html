<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>你是累了，还是该辞职了？ - 20题完整版心理测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  color: #333;
}
.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
}
/* 通用卡片样式 */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
/* 欢迎页 */
.welcome-page .logo {
  text-align: center;
  margin-bottom: 24px;
}
.welcome-page .logo h1 {
  font-size: 24px;
  color: #764ba2;
  margin-bottom: 8px;
}
.welcome-page .logo p {
  font-size: 14px;
  color: #666;
}
.welcome-page .desc {
  font-size: 15px;
  line-height: 1.8;
  color: #555;
  margin-bottom: 24px;
  text-align: center;
}
.welcome-page .price-tag {
  display: inline-block;
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  color: #fff;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 20px;
}
/* 进度条 */
.progress-bar {
  background: #e8e8e8;
  height: 6px;
  border-radius: 3px;
  margin-bottom: 16px;
  overflow: hidden;
}
.progress-fill {
  background: linear-gradient(90deg, #667eea, #764ba2);
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
}
.progress-text {
  font-size: 12px;
  color: #999;
  text-align: right;
  margin-bottom: 8px;
}
/* 题目页 */
.question-page .category-tag {
  display: inline-block;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  margin-bottom: 12px;
}
.question-page .question-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.6;
  margin-bottom: 20px;
  color: #333;
}
.option-list {
  list-style: none;
}
.option-item {
  background: #f7f7f7;
  border: 2px solid transparent;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 15px;
  line-height: 1.5;
}
.option-item:hover {
  background: #eee;
}
.option-item.selected {
  background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
  border-color: #764ba2;
  color: #764ba2;
  font-weight: 500;
}
.option-label {
  font-weight: bold;
  color: #764ba2;
  margin-right: 8px;
}
/* 按钮 */
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: center;
}
.btn-primary {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.btn-secondary {
  background: #f0f0f0;
  color: #666;
  margin-top: 10px;
}
.btn-share {
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  color: #fff;
  margin-top: 10px;
}
/* 结果页 */
.result-page .result-type {
  text-align: center;
  margin-bottom: 24px;
}
.result-type-icon {
  font-size: 48px;
  margin-bottom: 8px;
}
.result-type-name {
  font-size: 22px;
  font-weight: 700;
  color: #764ba2;
  margin-bottom: 4px;
}
.result-type-desc {
  font-size: 14px;
  color: #666;
}
/* 雷达图 */
.radar-chart {
  width: 240px;
  height: 240px;
  margin: 16px auto;
  position: relative;
}
.radar-svg {
  width: 100%;
  height: 100%;
}
/* 评分 */
.score-section {
  text-align: center;
  margin-bottom: 20px;
}
.score-number {
  font-size: 48px;
  font-weight: 700;
  color: #764ba2;
}
.score-label {
  font-size: 14px;
  color: #666;
}
.score-bar {
  background: #e8e8e8;
  height: 8px;
  border-radius: 4px;
  margin: 8px 0;
  overflow: hidden;
}
.score-bar-fill {
  background: linear-gradient(90deg, #667eea, #764ba2);
  height: 100%;
  border-radius: 4px;
}
/* 解读卡片 */
.interpret-card {
  background: linear-gradient(135deg, rgba(102,126,234,0.05), rgba(118,75,162,0.05));
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.interpret-card h4 {
  font-size: 15px;
  color: #764ba2;
  margin-bottom: 8px;
}
.interpret-card p {
  font-size: 14px;
  line-height: 1.6;
  color: #555;
}
/* 路径对比 */
.path-compare {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}
.path-card {
  flex: 1;
  background: #f7f7f7;
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}
.path-card h5 {
  font-size: 14px;
  margin-bottom: 6px;
}
.path-card p {
  font-size: 12px;
  line-height: 1.4;
  color: #666;
}
.path-a { border: 2px solid #ff6b6b; }
.path-a h5 { color: #ff6b6b; }
.path-b { border: 2px solid #4ecdc4; }
.path-b h5 { color: #4ecdc4; }
/* 90天方案 */
.action-plan {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
.action-plan h4 {
  font-size: 15px;
  margin-bottom: 12px;
}
.action-step {
  display: flex;
  align-items: flex-start;
  margin-bottom: 10px;
  font-size: 13px;
  line-height: 1.5;
}
.action-step .step-num {
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  width: 24px;
  height: 24px;
  text-align: center;
  line-height: 24px;
  font-size: 12px;
  font-weight: bold;
  margin-right: 10px;
  flex-shrink: 0;
}
/* 隐藏/显示 */
.hidden { display: none !important; }
.fade-in {
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
/* 响应式 */
@media (max-width: 380px) {
  .container { padding: 12px; }
  .card { padding: 16px; }
  .question-page .question-text { font-size: 15px; }
  .option-item { padding: 12px; font-size: 14px; }
}
</style>
</head>
<body>
<div class="container">

<!-- 欢迎页 -->
<div id="welcome-page" class="welcome-page">
  <div class="card">
    <div class="logo">
      <h1>🧠 你是累了，还是该辞职了？</h1>
      <p>20 题完整版 · 专业心理诊断</p>
    </div>
    <div class="desc">
      <span class="price-tag">¥1.99 正版测试</span><br>
      覆盖<strong>身体能量、工作动机、价值认同、成长空间、综合判断</strong>五大维度<br>
      生成专属诊断报告 + 90天行动方案
    </div>
    <button class="btn btn-primary" onclick="startTest()">开始测试 →</button>
  </div>
</div>

<!-- 题目页 -->
<div id="question-page" class="question-page hidden">
  <div class="card">
    <div class="progress-text" id="progress-text">第 1/20 题</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:5%"></div></div>
    <div class="category-tag" id="category-tag">身体能量</div>
    <div class="question-text" id="question-text"></div>
    <ul class="option-list" id="option-list"></ul>
    <button class="btn btn-primary" id="next-btn" disabled onclick="nextQuestion()">下一题 →</button>
  </div>
</div>

<!-- 结果页 -->
<div id="result-page" class="result-page hidden">
  <div class="card">
    <div class="result-type">
      <div class="result-type-icon" id="result-icon"></div>
      <div class="result-type-name" id="result-name"></div>
      <div class="result-type-desc" id="result-desc"></div>
    </div>
  </div>

  <div class="card">
    <div class="score-section">
      <div class="score-label">决策清晰度评分</div>
      <div class="score-number" id="score-number"></div>
      <div class="score-bar"><div class="score-bar-fill" id="score-bar-fill"></div></div>
      <div style="font-size:12px;color:#999" id="score-hint"></div>
    </div>
  </div>

  <div class="card">
    <h3 style="font-size:16px;color:#764ba2;margin-bottom:12px">📊 五维雷达图</h3>
    <div class="radar-chart" id="radar-chart"></div>
  </div>

  <div class="card">
    <div class="interpret-card">
      <h4>🔍 核心解读</h4>
      <p id="interpret-core"></p>
    </div>
    <div class="interpret-card">
      <h4>🧠 心理机制</h4>
      <p id="interpret-mechanism"></p>
    </div>
  </div>

  <div class="card">
    <h3 style="font-size:16px;color:#764ba2;margin-bottom:12px">🛤️ 两条路径对比</h3>
    <div class="path-compare">
      <div class="path-card path-a">
        <h5 id="path-a-title">路径 A</h5>
        <p id="path-a-desc"></p>
      </div>
      <div class="path-card path-b">
        <h5 id="path-b-title">路径 B</h5>
        <p id="path-b-desc"></p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="action-plan">
      <h4>📋 90 天行动方案</h4>
      <div id="action-steps"></div>
    </div>
  </div>

  <div class="card" style="text-align:center">
    <button class="btn btn-primary" onclick="restartTest()">🔄 重新测试</button>
    <button class="btn btn-share" onclick="shareResult()">📤 分享结果</button>
  </div>
</div>

</div>

<script>
// ============ 题目数据 ============
const questions = [
  // 维度1：身体能量 (4题)
  { category: "身体能量", text: "早上起床想到今天的工作，你的第一反应更接近：", options: ["想逃避，不想面对", "累，但可以接受", "有压力，但也有期待", "平静，按部就班"] },
  { category: "身体能量", text: "最近一个月，你下班后的状态通常是：", options: ["瘫在沙发上什么都不想干", "需要一段缓冲时间才能恢复", "还能做些自己的事情", "精力尚可，愿意活动"] },
  { category: "身体能量", text: "你现在的睡眠质量如何？", options: ["经常失眠或做噩梦", "睡不够，醒来依然疲惫", "还行，偶尔睡不好", "很好，基本一觉到天亮"] },
  { category: "身体能量", text: "你最近对食物的态度是：", options: ["没胃口，吃什么都无所谓", "偶尔暴饮暴食或零食依赖", "正常吃饭，没什么特别", "注重饮食，有规律"] },

  { category: "工作动机", text: "如果工资不变，你会选择继续这份工作吗？", options: ["绝对不会，一秒都不想多待", "大概率不会，但怕找不到更好的", "犹豫，有些部分还是不错的", "会的，虽然不完美但总体还行"] },
  { category: "工作动机", text: "你对未来3年的职业期待是：", options: ["只想换个方向重新开始", "希望能转岗或调部门", "期待在现有岗位上升级", "期待在行业内深入发展"] },
  { category: "工作动机", text: "你工作中最有成就感的时刻是：", options: ["几乎没有，只在发工资时短暂开心", "偶尔被认可，但很快消退", "完成一个项目或解决难题时", "每天都在积累和进步"] },

  { category: "价值认同", text: "你是否认同自己工作的意义？", options: ["完全不认同，觉得没价值", "部分认同，但不够重要", "基本认同，偶有怀疑", "高度认同，愿意为之付出"] },
  { category: "价值认同", text: "你觉得自己在工作中发挥的价值有多大？", options: ["几乎为零，可有可无", "有限，被流程和规定限制", "有一定价值，但没被充分看见", "很有价值，被认可和依赖"] },
  { category: "价值认同", text: "你的工作与你的个人价值观匹配度如何？", options: ["严重冲突，做的事情和信念相反", "有些地方不一致，但可以容忍", "大部分匹配，小部分存疑", "高度匹配，工作就是价值观的实践"] },
  { category: "价值认同", text: "如果朋友问你在做什么工作，你的反应是：", options: ["回避或敷衍，不想聊", "能说但不主动展开", "愿意聊聊，有些自豪", "乐意分享，很有底气"] },
  // 维度4：成长空间 (4题)
  { category: "成长空间", text: "过去一年，你觉得自己专业上：", options: ["明显退步或停滞", "原地踏步", "有一些进步", "成长明显，能力升级"] },
  { category: "成长空间", text: "你所在团队/公司的学习氛围如何？", options: ["几乎没有，大家只是在混日子", "偶尔有人分享，但不成体系", "有培训和学习机会，但质量参差", "很浓厚，大家都在主动学习"] },

  // 维度5：综合判断 (4题)
  { category: "综合判断", text: "如果明天有一个合适的机会出现，你会：", options: ["立刻想走", "认真考虑", "观望一下", "不一定，要看机会质量"] },

];

    core: "你的外在指标都不差，但内在驱动力正在减弱。你不是累，而是空。需要的不是休息，而是重新连接你做这件事的深层意义。",
    mechanism: "你处于「意义空洞期」——技能成熟、收入稳定，但内心缺少一个让这一切值得的理由。这是职业发展中的正常阶段，但如果不主动填补，会逐渐滑向深度倦怠。",
    pathA: { title: "路径 A：意义挖掘", desc: "重新审视你的工作——不是从任务层面，而是从影响和贡献层面。找到你真正在乎的东西。" },
    pathB: { title: "路径 B：跨界注入", desc: "在本职之外开辟一个平行赛道——副业、教学、志愿者。多元意义来源让整体更有韧性。" },
    actions: [
      "第1-10天：写出「我为什么做这份工作」的10个版本，找到最让你动心的那个",
      "第11-30天：基于新意义，重新定义你的核心角色——不是职位，而是你想成为什么样的人",
      "第31-60天：设计一个让新意义落地的具体项目或行动，开始实验",
      "第61-90天：评估意义升级的效果，调整并固化新的职业叙事"
    ]
  }
};

// ============ 状态变量 ============
let currentQuestion = 0;
let answers = [];
let scores = { "身体能量": 0, "工作动机": 0, "价值认同": 0, "成长空间": 0, "综合判断": 0 };

// ============ 逻辑函数 ============
function startTest() {
  document.getElementById('welcome-page').classList.add('hidden');
  document.getElementById('question-page').classList.remove('hidden');
  document.getElementById('question-page').classList.add('fade-in');
  currentQuestion = 0;
  answers = [];
  scores = { "身体能量": 0, "工作动机": 0, "价值认同": 0, "成长空间": 0, "综合判断": 0 };
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('progress-text').textContent = `第 ${currentQuestion + 1}/20 题`;
  document.getElementById('progress-fill').style.width = `${(currentQuestion + 1) / 20 * 100}%`;
  document.getElementById('category-tag').textContent = q.category;
  document.getElementById('question-text').textContent = q.text;

  const optionList = document.getElementById('option-list');
  optionList.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const li = document.createElement('li');
    li.className = 'option-item';
    li.innerHTML = `<span class="option-label">${labels[i]}.</span> ${opt}`;
    li.onclick = () => selectOption(i, li);
    optionList.appendChild(li);
  });

  document.getElementById('next-btn').disabled = true;
  if (currentQuestion === 19) {
    document.getElementById('next-btn').textContent = '查看结果 →';
  } else {
    document.getElementById('next-btn').textContent = '下一题 →';
  }
}

function selectOption(index, element) {
  const items = document.querySelectorAll('.option-item');
  items.forEach(item => item.classList.remove('selected'));
  element.classList.add('selected');
  answers[currentQuestion] = index;
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  if (answers[currentQuestion] === undefined) return;

  // 计算分数 (A=1, B=2, C=3, D=4)
  const q = questions[currentQuestion];
  scores[q.category] += (answers[currentQuestion] + 1);

  currentQuestion++;
  if (currentQuestion < 20) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('question-page').classList.add('hidden');
  document.getElementById('result-page').classList.remove('hidden');
  document.getElementById('result-page').classList.add('fade-in');

  // 判断结果类型
  const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
  const avg = totalScore / 5;
  let resultKey;

  if (avg <= 8) resultKey = 'quit';
  else if (avg <= 12) resultKey = 'tired';
  else if (avg <= 16) resultKey = 'upgrade';
  else resultKey = 'reshape';

  const result = resultTypes[resultKey];

  // 基础信息
  document.getElementById('result-icon').textContent = result.icon;
  document.getElementById('result-name').textContent = result.name;
  document.getElementById('result-desc').textContent = result.desc;

  // 决策清晰度评分
  const clarityScore = Math.round(100 - (avg - 5) * 7.5);
  const displayScore = Math.max(20, Math.min(95, clarityScore));
  document.getElementById('score-number').textContent = displayScore;
  document.getElementById('score-bar-fill').style.width = `${displayScore}%`;
  document.getElementById('score-hint').textContent = displayScore >= 70 ? '你的方向比较清晰，行动力强' : displayScore >= 40 ? '你还在权衡中，需要更多信号' : '你的内心已经很明确了';

  // 雷达图
  drawRadar(scores);

  // 解读
  document.getElementById('interpret-core').textContent = result.core;
  document.getElementById('interpret-mechanism').textContent = result.mechanism;

  // 路径对比
  document.getElementById('path-a-title').textContent = result.pathA.title;
  document.getElementById('path-a-desc').textContent = result.pathA.desc;
  document.getElementById('path-b-title').textContent = result.pathB.title;
  document.getElementById('path-b-desc').textContent = result.pathB.desc;

  // 90天行动方案
  const stepsDiv = document.getElementById('action-steps');
  stepsDiv.innerHTML = '';
  result.actions.forEach((action, i) => {
    stepsDiv.innerHTML += `<div class="action-step"><span class="step-num">${i + 1}</span><span>${action}</span></div>`;
  });
}

function drawRadar(scores) {
  const container = document.getElementById('radar-chart');
  const categories = ["身体能量", "工作动机", "价值认同", "成长空间", "综合判断"];
  const maxScore = 16; // 每维度4题，满分16
  const cx = 120, cy = 120, r = 90;

  let svg = `<svg viewBox="0 0 240 240" class="radar-svg">`;

  // 背景网格
  for (let level = 1; level <= 4; level++) {
    const lr = r * level / 4;
    const points = categories.map((_, i) => {
      const angle = (i * 72 - 90) * Math.PI / 180;
      return `${cx + lr * Math.cos(angle)},${cy + lr * Math.sin(angle)}`;
    }).join(' ');
    svg += `<polygon points="${points}" fill="none" stroke="#ddd" stroke-width="1"/>`;
  }

  // 轴线
  categories.forEach((_, i) => {
    const angle = (i * 72 - 90) * Math.PI / 180;
    svg += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="#ccc" stroke-width="1"/>`;
  });

  // 数据区域
  const dataPoints = categories.map((cat, i) => {
    const val = scores[cat] / maxScore;
    const angle = (i * 72 - 90) * Math.PI / 180;
    const dr = r * val;
    return `${cx + dr * Math.cos(angle)},${cy + dr * Math.sin(angle)}`;
  }).join(' ');
  svg += `<polygon points="${dataPoints}" fill="rgba(118,75,162,0.3)" stroke="#764ba2" stroke-width="2"/>`;

  // 数据点
  categories.forEach((cat, i) => {
    const val = scores[cat] / maxScore;
    const angle = (i * 72 - 90) * Math.PI / 180;
    const dr = r * val;
    svg += `<circle cx="${cx + dr * Math.cos(angle)}" cy="${cy + dr * Math.sin(angle)}" r="4" fill="#764ba2"/>`;
  });

  // 标签
  categories.forEach((cat, i) => {
    const angle = (i * 72 - 90) * Math.PI / 180;
    const lx = cx + (r + 20) * Math.cos(angle);
    const ly = cy + (r + 20) * Math.sin(angle);
    svg += `<text x="${lx}" y="${ly}" text-anchor="middle" font-size="11" fill="#666">${cat}</text>`;
  });

  svg += `</svg>`;
  container.innerHTML = svg;
}

function restartTest() {
  document.getElementById('result-page').classList.add('hidden');
  startTest();
}

function shareResult() {
  const resultName = document.getElementById('result-name').textContent;
  const text = `我刚做了「你是累了还是该辞职了」20题测试，结果是【${resultName}】！你也来试试 👇`;
  if (navigator.share) {
    navigator.share({ title: '心理测试结果', text: text });
  } else {
    // 复制到剪贴板
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    alert('已复制到剪贴板，可分享到社交平台！');
  }
}
</script>
