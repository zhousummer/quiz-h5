<!DOCTYPE html>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #F0F8FF;
  min-height: 100vh;
  color: #3D5A6C;
}
.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 20px;
}

/* 欢迎页 */
.welcome { text-align: center; padding-top: 60px; }
.welcome .emoji-top { font-size: 80px; margin-bottom: 20px; }
.welcome h1 {
  font-size: 32px;
  color: #2C5F6E;
  margin-bottom: 12px;
  line-height: 1.4;
}
.welcome .subtitle {
  font-size: 16px;
  color: #6B8E9A;
  margin-bottom: 30px;
  line-height: 1.6;
}
.welcome .vs-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-bottom: 40px;
  padding: 24px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 4px 20px rgba(135,206,250,0.15);
}
.welcome .vs-item {
  text-align: center;

}
.welcome .vs-item .icon { font-size: 48px; }
.welcome .vs-item .label { font-size: 14px; color: #3D5A6C; margin-top: 8px; line-height: 1.5; }
.welcome .vs-divider {
  font-size: 24px;
  font-weight: bold;
  color: #87CEFA;
  padding: 0 8px;
}
.welcome .dims {
  text-align: left;
  margin-bottom: 40px;
}
.welcome .dim-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  font-size: 15px;
  color: #5A8A9A;
}
.welcome .dim-item .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #87CEFA;
  flex-shrink: 0;
}

/* 按钮 */
.btn {
  display: inline-block;
  padding: 16px 60px;
  background: linear-gradient(135deg, #87CEFA, #64B5E6);
  color: white;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 6px 24px rgba(135,206,250,0.4);
  transition: all 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(135,206,250,0.5); }
.btn:active { transform: translateY(0); }
.btn-small { padding: 12px 40px; font-size: 16px; }
.btn-outline {
  background: white;
  color: #87CEFA;
  border: 2px solid #87CEFA;
  box-shadow: none;
}

/* 测试页 */
.quiz-page { display: none; }
.quiz-page.active { display: block; }

.progress-bar {
  width: 100%;
  height: 8px;
  background: #E0E0E0;
  border-radius: 4px;
  margin-bottom: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #87CEFA, #64B5E6);
  border-radius: 4px;
  transition: width 0.4s ease;
}
.progress-text {
  text-align: center;
  font-size: 14px;
  color: #6B8E9A;
  margin-bottom: 30px;
}

.question { margin-bottom: 30px; }
.question .q-num {
  display: inline-block;
  width: 36px;
  height: 36px;
  line-height: 36px;
  text-align: center;
  background: #87CEFA;
  color: white;
  border-radius: 50%;
  font-weight: bold;
  font-size: 16px;
  margin-right: 10px;
}
.question h3 {
  display: inline;
  font-size: 20px;
  color: #2C5F6E;
  line-height: 1.5;
}

.options { margin-top: 20px; }
.option {
  display: block;
  width: 100%;
  padding: 18px 20px;
  margin-bottom: 12px;
  background: white;
  border: 2px solid #E8F4FD;
  border-radius: 16px;
  font-size: 16px;
  color: #3D5A6C;
  text-align: left;
  cursor: pointer;
  transition: all 0.3s;
}
.option:hover { border-color: #87CEFA; background: #F0F8FF; }
.option.selected {
  border-color: #87CEFA;
  background: #F0F8FF;
  box-shadow: 0 2px 12px rgba(135,206,250,0.2);
}
.option .opt-label {
  display: inline-block;
  width: 28px;
  height: 28px;
  line-height: 28px;
  text-align: center;
  background: #87CEFA;
  color: white;
  border-radius: 50%;
  font-weight: bold;
  font-size: 14px;
  margin-right: 12px;
}

/* 快速结果页 */
.quick-result { display: none; text-align: center; padding-top: 40px; }
.quick-result.active { display: block; }
.quick-result .result-type {
  font-size: 48px;
  margin-bottom: 10px;
}
.quick-result .result-name {
  font-size: 28px;
  font-weight: bold;
  color: #2C5F6E;
  margin-bottom: 8px;
}
.quick-result .result-desc {
  font-size: 15px;
  color: #6B8E9A;
  margin-bottom: 30px;
  line-height: 1.6;
}
.quick-result .result-chart {

}
.quick-result .upgrade-box {
  background: white;

.quick-result .upgrade-box h4 {
  font-size: 20px;
  color: #2C5F6E;
  margin-bottom: 12px;
}
.quick-result .upgrade-box p {
  font-size: 14px;
  color: #6B8E9A;
  margin-bottom: 20px;
  line-height: 1.6;
}

/* 完整结果页 */
.full-result { display: none; text-align: center; padding-top: 30px; }
.full-result.active { display: block; }
.full-result .result-type { font-size: 60px; margin-bottom: 10px; }
.full-result .result-name {
  font-size: 32px;
  font-weight: bold;
  color: #2C5F6E;
  margin-bottom: 8px;
}
.full-result .score {

  border-radius: 20px;
  font-size: 16px;
  color: #5A8A9A;

  font-size: 15px;
  color: #3D5A6C;

  padding: 20px;

  border-radius: 16px;
}
.full-result .chart-box {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin: 20px 0;
  box-shadow: 0 4px 20px rgba(135,206,250,0.1);
}
.full-result .chart-box h4 {
  font-size: 18px;
  color: #2C5F6E;
  margin-bottom: 16px;
}
.full-result .radar-container {
  width: 280px;
  height: 280px;
  margin: 0 auto;
}
.full-result .action-plan {
  text-align: left;
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin: 20px 0;
}
.full-result .action-plan h4 {
  font-size: 18px;
  color: #2C5F6E;
  margin-bottom: 16px;
  text-align: center;
}
.full-result .action-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 12px 0;
  border-bottom: 1px solid #F0F8FF;

.full-result .action-item:last-child { border-bottom: none; }
.full-result .action-num {
  width: 28px;
  height: 28px;
  line-height: 28px;
  text-align: center;
  background: #87CEFA;
  color: white;
  border-radius: 50%;
  font-weight: bold;
  font-size: 14px;
  flex-shrink: 0;
}
.full-result .action-text {
  font-size: 14px;
  color: #3D5A6C;
  line-height: 1.6;
}
.full-result .path-box {
  text-align: left;
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin: 20px 0;
}
.full-result .path-box h4 {
  font-size: 18px;
  color: #2C5F6E;
  margin-bottom: 16px;
  text-align: center;
}
.full-result .path-step {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  font-size: 14px;
  color: #3D5A6C;

.full-result .path-arrow { color: #87CEFA; font-size: 18px; }

.hidden { display: none; }
</style>
</head>
<body>

<div class="container" id="app">
  
  <!-- 欢迎页 -->
  <div class="welcome" id="welcome">
    <div class="emoji-top">🏙️🏡</div>
    <h1>你更适合大城市拼<br>还是小城市躺？</h1>

    <div class="options" id="optionsBox"></div>
    
    <button class="btn btn-small hidden" id="nextBtn" onclick="nextQuestion()">下一题</button>
  </div>

  <!-- 快速结果 -->
  <div class="quick-result" id="quickResult">
    <div class="result-type" id="qrType"></div>
    <div class="result-name" id="qrName"></div>
    <div class="result-desc" id="qrDesc"></div>
    
    <div class="result-chart">

    <div class="upgrade-box">
      <h4>🎯 想了解更多？</h4>
      <p>以上只是5题快速版结果。完成全部20题，你将获得：<br>
      ✅ 精确的城市适配度评分<br>
      ✅ 五维深度雷达图分析<br>
      ✅ 从"迷茫"到"清晰"的转变路径<br>
      ✅ 90天专属行动计划</p>
      <button class="btn" onclick="showFullQuiz()">解锁完整20题测试</button>
    </div>
  </div>

  <!-- 完整20题测试 -->
  <div class="quiz-page" id="fullQuizPage">
    <div class="progress-bar"><div class="progress-fill" id="fullProgressFill"></div></div>
    <div class="progress-text" id="fullProgressText">6/20</div>
    
    <div class="question" id="fullQuestionBox">
      <span class="q-num" id="fullQNum">6</span>
      <h3 id="fullQText"></h3>
    </div>
    
    <div class="options" id="fullOptionsBox"></div>
    
    <button class="btn btn-small hidden" id="fullNextBtn" onclick="fullNextQuestion()">下一题</button>
  </div>

  <!-- 完整结果 -->
  <div class="full-result" id="fullResult"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  // 维度1: 职业野心 (题6-9)

  { q: "公司给你一个外派机会但要去陌生城市，你？", options: ["毫不犹豫接受，机会难得", "综合考虑后决定", "有点犹豫但可能会去", "直接拒绝，不想折腾"], scores: [4, 3, 2, 1] },

  { type: "🌱", name: "成长观望型", desc: "你还在探索最适合自己的城市生活方式。你可能有些迷茫，但这很正常——找到方向本身就是一个过程，而你已经在路上了。", scoreLabel: "城市适配度", scoreRange: "30-50", scoreDesc: "仍在探索最佳城市选择" }
];

const dimNames = ["职业野心", "生活节奏", "社交偏好", "抗压能力", "归属感"];

// ===== 状态管理 =====
let quickAnswers = [];
let quickCurrent = 0;
let fullAnswers = [];
let fullCurrent = 0;

// ===== 快速测试 =====
function startQuiz() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('quizPage').classList.add('active');
  document.getElementById('quizPage').style.display = 'block';
  quickCurrent = 0;
  quickAnswers = [];
  showQuickQuestion();
}

function showQuickQuestion() {
  if (quickCurrent >= 5) {
    showQuickResult();
    return;
  }
  
  const q = quickQuestions[quickCurrent];
  document.getElementById('qNum').textContent = quickCurrent + 1;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = ((quickCurrent) / 5 * 100) + '%';
  document.getElementById('progressText').textContent = (quickCurrent + 1) + '/5';
  
  let html = '';
  q.options.forEach((opt, i) => {
    const sel = quickAnswers[quickCurrent] === i ? ' selected' : '';
    html += `<button class="option${sel}" onclick="selectQuickOption(${i})"><span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}</button>`;
  });
  document.getElementById('optionsBox').innerHTML = html;
  document.getElementById('nextBtn').classList.add('hidden');
}

function selectQuickOption(idx) {
  quickAnswers[quickCurrent] = idx;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextQuestion() {
  quickCurrent++;
  showQuickQuestion();
}

function showQuickResult() {
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('quizPage').classList.remove('active');
  document.getElementById('quickResult').classList.add('active');
  document.getElementById('quickResult').style.display = 'block';
  
  // 计算总分
  let total = 0;
  quickAnswers.forEach((ans, i) => {
    total += quickQuestions[i].scores[ans];
  });
  // 映射到100分制
  let score = Math.round((total - 5) / (20 - 5) * 100);
  score = Math.max(0, Math.min(100, score));
  
  // 确定结果
  let resultIdx;
  if (score >= 70) resultIdx = 0;
  else if (score <= 35) resultIdx = 1;
  else if (score >= 45) resultIdx = 2;
  else resultIdx = 3;
  
  const r = results[resultIdx];
  document.getElementById('qrType').textContent = r.type;
  document.getElementById('qrName').textContent = r.name;
  document.getElementById('qrDesc').textContent = r.desc;
  
  // 简单雷达图
  drawRadar('quickRadar', [60, 50, 70, 55, 45]);
}

// ===== 完整测试 =====
function showFullQuiz() {
  document.getElementById('quickResult').style.display = 'none';
  document.getElementById('quickResult').classList.remove('active');
  document.getElementById('fullQuizPage').classList.add('active');
  document.getElementById('fullQuizPage').style.display = 'block';
  fullCurrent = 0;
  fullAnswers = [];
  showFullQuestion();
}

function showFullQuestion() {
  if (fullCurrent >= 20) {
    showFullResult();
    return;
  }
  
  const q = fullQuestions[fullCurrent];
  document.getElementById('fullQNum').textContent = fullCurrent + 6;
  document.getElementById('fullQText').textContent = q.q;
  document.getElementById('fullProgressFill').style.width = ((fullCurrent + 5) / 25 * 100) + '%';
  document.getElementById('fullProgressText').textContent = (fullCurrent + 6) + '/25';
  
  let html = '';
  q.options.forEach((opt, i) => {
    const sel = fullAnswers[fullCurrent] === i ? ' selected' : '';
    html += `<button class="option${sel}" onclick="selectFullOption(${i})"><span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}</button>`;
  });
  document.getElementById('fullOptionsBox').innerHTML = html;
  document.getElementById('fullNextBtn').classList.add('hidden');
}

function selectFullOption(idx) {
  fullAnswers[fullCurrent] = idx;
  document.querySelectorAll('#fullOptionsBox .option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('fullNextBtn').classList.remove('hidden');
}

function fullNextQuestion() {
  fullCurrent++;
  showFullQuestion();
}

function showFullResult() {
  document.getElementById('fullQuizPage').style.display = 'none';
  document.getElementById('fullQuizPage').classList.remove('active');
  
  // 计算各维度得分（5维度 × 4题 = 20题）
  let dimScores = [0, 0, 0, 0, 0];
  fullAnswers.forEach((ans, i) => {
    const dimIdx = Math.floor(i / 4);
    dimScores[dimIdx] += fullQuestions[i].scores[ans];
  });
  
  // 每维度满分16(4×4)，归一化到100
  let dimNorm = dimScores.map(s => Math.round(s / 16 * 100));
  
  // 总分
  let totalScore = dimScores.reduce((a, b) => a + b, 0);
  let finalScore = Math.round(totalScore / 80 * 100);
  finalScore = Math.max(0, Math.min(100, finalScore));
  
  // 结果判定
  let resultIdx;
  if (finalScore >= 70) resultIdx = 0;
  else if (finalScore <= 35) resultIdx = 1;
  else if (finalScore >= 45 && finalScore < 70) resultIdx = 2;
  else resultIdx = 3;
  
  const r = results[resultIdx];
  
  // 转变路径
  let pathText;
  if (resultIdx === 3) {
    pathText = "🌱 成长观望型 → 🏙️/🏡 明确方向：先通过短期体验（大城市实习/小城市旅居）找到真正适合自己的节奏，不必急着做决定。";
  } else if (resultIdx === 0) {
    pathText = "🏙️ 大城市奋斗型 → 🏙️ 持续成长：你已经找到了适合的赛道，下一步是深耕领域、建立人脉、打造个人品牌。";
  } else if (resultIdx === 1) {
    pathText = "🏡 小城市安逸型 → 🏡 安住当下：你的幸福模式已经清晰，接下来是优化生活质量，在小城也能活出精彩。";
  } else {
    pathText = "🔄 两栖探索型 → 🔄 优化平衡：你已经找到了两边的节奏，下一步是建立「大城市资源+小城市生活」的可持续模式。";
  }
  
  // 90天行动计划
  const actionPlans = [
    ["第1-30天：盘点资源", "梳理你在大城市的人脉、技能、机会，明确核心竞争力"],
    ["第31-60天：设定目标", "制定3个月和1年的职业目标，并拆解为每周行动项"],
    ["第61-90天：执行+复盘", "按计划行动，每两周复盘一次，调整策略"]
  ];
  
  let html = `
    <div class="result-type">${r.type}</div>
    <div class="result-name">${r.name}</div>
    <div class="score">${r.scoreLabel}：${finalScore}分 · ${r.scoreDesc}</div>
    <div class="result-desc">${r.desc}</div>
    
    <div class="chart-box">
      <h4>📊 五维雷达图分析</h4>
      <div class="radar-container"><canvas id="fullRadar" width="280" height="280"></canvas></div>
    </div>
    
    <div class="path-box">
      <h4>🛤️ 你的城市选择路径</h4>
      <p style="font-size:14px;color:#3D5A6C;line-height:1.8;">${pathText}</p>
    </div>
    
    <div class="action-plan">
      <h4>📋 90天专属行动计划</h4>
      ${actionPlans.map((a, i) => `
        <div class="action-item">
          <div class="action-num">${i+1}</div>
          <div class="action-text"><strong>${a[0]}</strong><br>${a[1]}</div>
        </div>
      `).join('')}
    </div>
    
    <p style="font-size:13px;color:#6B8E9A;margin-top:20px;">💡 测试结果仅供参考，每个人的情况都是独特的<br>最重要的是找到让自己真正快乐的生活方式</p>
  `;
  
  document.getElementById('fullResult').innerHTML = html;
  document.getElementById('fullResult').classList.add('active');
  document.getElementById('fullResult').style.display = 'block';
  
  // 延迟绘制雷达图
  setTimeout(() => drawRadar('fullRadar', dimNorm), 300);
}

// ===== 雷达图 =====
function drawRadar(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  
  const ctx = canvas.getContext('2d');
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const radius = 100;
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // 绘制网格
  const levels = 5;
  const sides = 5;
  
  for (let level = 1; level <= levels; level++) {
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const angle = (Math.PI * 2 / sides) * i - Math.PI / 2;
      const r = (radius / levels) * level;
      const x = centerX + r * Math.cos(angle);
      const y = centerY + r * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = '#E0E0E0';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  
  // 绘制轴线
  for (let i = 0; i < sides; i++) {
    const angle = (Math.PI * 2 / sides) * i - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(centerX + radius * Math.cos(angle), centerY + radius * Math.sin(angle));
    ctx.strokeStyle = '#E0E0E0';
    ctx.stroke();
  }
  
  // 绘制数据区域
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const angle = (Math.PI * 2 / sides) * i - Math.PI / 2;
    const r = (data[i] / 100) * radius;
    const x = centerX + r * Math.cos(angle);
    const y = centerY + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(135, 206, 250, 0.3)';
  ctx.fill();
  ctx.strokeStyle = '#87CEFA';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // 绘制数据点
  for (let i = 0; i < sides; i++) {
    const angle = (Math.PI * 2 / sides) * i - Math.PI / 2;
    const r = (data[i] / 100) * radius;
    const x = centerX + r * Math.cos(angle);
    const y = centerY + r * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#64B5E6';
    ctx.fill();
  }
  
  // 标签
  ctx.fillStyle = '#3D5A6C';
  ctx.font = '12px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i < sides; i++) {
    const angle = (Math.PI * 2 / sides) * i - Math.PI / 2;
    const x = centerX + (radius + 25) * Math.cos(angle);
    const y = centerY + (radius + 25) * Math.sin(angle) + 4;
    ctx.fillText(dimNames[i], x, y);
  }
}
</script>
