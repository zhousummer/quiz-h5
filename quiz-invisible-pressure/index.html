<body>
<div class="container">

<!-- 欢迎页 -->
<div id="welcome-page" class="welcome-page">

</div>

<!-- 结果页 -->

  <div class="card">

    <button class="btn btn-share" onclick="shareResult()">📤 分享结果</button>

</div>

</div>

<script>
const questions = [
  // 维度1：情绪压力 (4题)
  { category: "情绪压力", text: "最近有没有一种「说不出的累」？", options: ["经常有，但不知道为什么", "偶尔有，忙的时候更明显", "很少，基本能自我调节", "几乎没有，心态很稳"] },
  { category: "情绪压力", text: "你独处时的情绪状态通常是：", options: ["很低落，总想哭或发呆", "有点空虚，需要找事填补", "平静，偶尔有些小波动", "很自在，享受独处时光"] },
  { category: "情绪压力", text: "你对负面情绪的处理方式：", options: ["压抑它，假装没事", "默默消化，很少找人倾诉", "会跟亲近的人聊聊", "很快就能自我调节好"] },
  { category: "情绪压力", text: "你最近是否经常感到「心里堵着什么东西」？", options: ["几乎每天，胸口闷闷的", "经常有，但说不清是什么", "偶尔有，忙碌时更明显", "很少，内心比较通透"] },
  // 维度2：时间压力 (4题)
  { category: "时间压力", text: "你对「时间不够用」的感受有多强烈？", options: ["每天都在赶赶赶，喘不过气", "经常觉得，但还能勉强应付", "偶尔焦虑，大部分时间够用", "很少，节奏比较从容"] },

  { category: "时间压力", text: "你休息时的状态是：", options: ["根本不敢休息，怕浪费时间", "休息时也在想工作的事", "能放下，但总觉得休息不够", "真正放松，不焦虑时间"] },

  { category: "关系压力", text: "社交后你的感受通常是：", options: ["很疲惫，需要很长时间恢复", "有点累，但还是觉得值得", "还行，不会特别消耗", "很享受，社交是充电方式"] },
  { category: "关系压力", text: "当别人对你提要求时，你的第一反应：", options: ["立即答应，哪怕自己不方便", "犹豫一下，最终大概率答应", "先考虑自己的情况再决定", "根据实际情况直接回应"] },
  { category: "关系压力", text: "你对「被误解」的恐惧程度：", options: ["非常恐惧，拼命解释和讨好", "比较害怕，但能克制住", "有点在意，但很快放下", "不太在意，知道自己就好"] },
  // 维度4：期待压力 (4题)
  { category: "期待压力", text: "你觉得别人对你的期待和你的真实能力之间：", options: ["差距很大，永远达不到", "有差距，但还在努力追赶", "基本匹配，偶尔有落差", "很匹配，甚至超出期待"] },

    desc: "你的压力来自一个看不见的标准——活在别人设定的坐标系里，永远觉得差一点",
    core: "你的隐形压力核心来源是「期待落差」——你总觉得自己不够好，因为你衡量自己的标尺不是自己定的，而是别人和社会的。你一直在追一个不属于你的终点。",
    mechanism: "期待落差型的人有强烈的「外评驱动」——你通过别人的认可来确认自己的价值，而不是通过内在标准。这意味着即使你已经做得很好，如果别人不认可，你依然觉得不够。你的压力不是能力不足，而是标准错位。",
    pathA: { title: "路径 A：标准重定", desc: "建立你自己的「够好」标准——不是降低要求，而是把标尺从外部移到内部。你自己说了算。" },
    pathB: { title: "路径 B：期待脱钩", desc: "逐步减少对他人评价的依赖——从「被认可才有价值」到「我知道自己有价值就够了」。" },
    actions: [
      "第1-7天：写下10条「别人觉得我应该做到的事」，逐条问：这真的是我想要的吗？",
      "第8-30天：每天做1件「只让自己满意的事」，不需要任何人知道或认可",
      "第31-60天：建立你的「个人成就清单」——只记录让你内心真正有成就感的事",
      "第61-90天：对外评的依赖程度做一次评估，看是否在逐步下降"
    ]
  }
};

let currentQuestion = 0;
let answers = [];
let scores = { "情绪压力": 0, "时间压力": 0, "关系压力": 0, "期待压力": 0, "自我压力": 0 };

function startTest() {
  document.getElementById('welcome-page').classList.add('hidden');
  document.getElementById('question-page').classList.remove('hidden');
  document.getElementById('question-page').classList.add('fade-in');
  currentQuestion = 0;
  answers = [];
  scores = { "情绪压力": 0, "时间压力": 0, "关系压力": 0, "期待压力": 0, "自我压力": 0 };
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('progress-text').textContent = `第 ${currentQuestion + 1}/20 题`;
  document.getElementById('progress-fill').style.width = `${(currentQuestion + 1) / 20 * 100}%`;
  document.getElementById('category-tag').textContent = q.category;
  document.getElementById('question-text').textContent = q.text;
  const optionList = document.getElementById('option-list');
  optionList.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const li = document.createElement('li');
    li.className = 'option-item';
    li.innerHTML = `<span class="option-label">${labels[i]}.</span> ${opt}`;
    li.onclick = () => selectOption(i, li);
    optionList.appendChild(li);
  });
  document.getElementById('next-btn').disabled = true;
  document.getElementById('next-btn').textContent = currentQuestion === 19 ? '查看结果 →' : '下一题 →';
}

function selectOption(index, element) {
  document.querySelectorAll('.option-item').forEach(item => item.classList.remove('selected'));
  element.classList.add('selected');
  answers[currentQuestion] = index;
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  if (answers[currentQuestion] === undefined) return;
  const q = questions[currentQuestion];
  scores[q.category] += (answers[currentQuestion] + 1);
  currentQuestion++;
  if (currentQuestion < 20) showQuestion();
  else showResult();
}

function showResult() {
  document.getElementById('question-page').classList.add('hidden');
  document.getElementById('result-page').classList.remove('hidden');
  document.getElementById('result-page').classList.add('fade-in');

  const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
  const avg = totalScore / 5;
  let resultKey;
  if (avg <= 8) resultKey = 'emotional';
  else if (avg <= 12) resultKey = 'time';
  else if (avg <= 16) resultKey = 'relation';
  else resultKey = 'expectation';

  const result = resultTypes[resultKey];

  document.getElementById('result-icon').textContent = result.icon;
  document.getElementById('result-name').textContent = result.name;
  document.getElementById('result-desc').textContent = result.desc;

  const stressScore = Math.round(100 - avg * 5);
  const displayScore = Math.max(20, Math.min(95, stressScore));
  document.getElementById('score-number').textContent = displayScore;
  document.getElementById('score-bar-fill').style.width = `${displayScore}%`;
  document.getElementById('score-hint').textContent = displayScore >= 70 ? '你的隐形压力偏高，需要关注了' : displayScore >= 40 ? '你的压力在中等水平，可以优化' : '你的压力水平较低，状态不错';

  drawRadar(scores);

  document.getElementById('interpret-core').textContent = result.core;
  document.getElementById('interpret-mechanism').textContent = result.mechanism;
  document.getElementById('path-a-title').textContent = result.pathA.title;
  document.getElementById('path-a-desc').textContent = result.pathA.desc;
  document.getElementById('path-b-title').textContent = result.pathB.title;
  document.getElementById('path-b-desc').textContent = result.pathB.desc;

  const stepsDiv = document.getElementById('action-steps');
  stepsDiv.innerHTML = '';
  result.actions.forEach((action, i) => {
    stepsDiv.innerHTML += `<div class="action-step"><span class="step-num">${i + 1}</span><span>${action}</span></div>`;
  });
}

function drawRadar(scores) {
  const container = document.getElementById('radar-chart');
  const categories = ["情绪压力", "时间压力", "关系压力", "期待压力", "自我压力"];
  const maxScore = 16;
  const cx = 120, cy = 120, r = 90;
  let svg = `<svg viewBox="0 0 240 240" class="radar-svg">`;
  for (let level = 1; level <= 4; level++) {
    const lr = r * level / 4;
    const points = categories.map((_, i) => {
      const angle = (i * 72 - 90) * Math.PI / 180;
      return `${cx + lr * Math.cos(angle)},${cy + lr * Math.sin(angle)}`;
    }).join(' ');
    svg += `<polygon points="${points}" fill="none" stroke="#D4D0CC" stroke-width="1"/>`;
  }
  categories.forEach((_, i) => {
    const angle = (i * 72 - 90) * Math.PI / 180;
    svg += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="#C0C0C0" stroke-width="1"/>`;
  });
  const dataPoints = categories.map((cat, i) => {
    const val = scores[cat] / maxScore;
    const angle = (i * 72 - 90) * Math.PI / 180;
    const dr = r * val;
    return `${cx + dr * Math.cos(angle)},${cy + dr * Math.sin(angle)}`;
  }).join(' ');
  svg += `<polygon points="${dataPoints}" fill="rgba(168,139,126,0.3)" stroke="#A88B7E" stroke-width="2"/>`;
  categories.forEach((cat, i) => {
    const val = scores[cat] / maxScore;
    const angle = (i * 72 - 90) * Math.PI / 180;
    const dr = r * val;
    svg += `<circle cx="${cx + dr * Math.cos(angle)}" cy="${cy + dr * Math.sin(angle)}" r="4" fill="#A88B7E"/>`;
  });
  categories.forEach((cat, i) => {
    const angle = (i * 72 - 90) * Math.PI / 180;
    const lx = cx + (r + 20) * Math.cos(angle);
    const ly = cy + (r + 20) * Math.sin(angle);
    svg += `<text x="${lx}" y="${ly}" text-anchor="middle" font-size="11" fill="#6C6867">${cat}</text>`;
  });
  svg += `</svg>`;
  container.innerHTML = svg;
}

function restartTest() {
  document.getElementById('result-page').classList.add('hidden');
  startTest();
}

function shareResult() {
  const resultName = document.getElementById('result-name').textContent;
  const text = `我刚做了「你的隐形压力有多大」20题测试，结果是【${resultName}】🌿 每一份压力都值得被看见，你也来试试 👇`;
  if (navigator.share) {
    navigator.share({ title: '压力测试结果', text: text });
  } else {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    alert('已复制到剪贴板，可分享到社交平台！🌿');
  }
}
</script>
