<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>你是否适合从商 - 20题完整版商业潜能测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #F0F8FF;
  min-height: 100vh;
  color: #3D5A6C;
}
.container { max-width: 500px; margin: 0 auto; padding: 20px; }

/* 欢迎页 */
.welcome { text-align: center; padding-top: 50px; }
.welcome .emoji-top { font-size: 64px; margin-bottom: 16px; }
.welcome h1 {
  font-size: 32px;
  color: #2C5F6E;
  margin-bottom: 10px;
  line-height: 1.4;
}
.welcome .subtitle {
  font-size: 15px;
  color: #6B8E9A;
  margin-bottom: 28px;
  line-height: 1.6;
}
.welcome .dims {
  text-align: left;
  margin-bottom: 36px;
  background: white;
  border-radius: 20px;
  padding: 20px 24px;
  box-shadow: 0 4px 20px rgba(135,206,250,0.1);
}
.welcome .dim-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 0;
  font-size: 15px;
  color: #5A8A9A;
}
.welcome .dim-item .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #87CEFA;
  flex-shrink: 0;
}

.btn {
  display: inline-block;
  padding: 16px 60px;
  background: linear-gradient(135deg, #87CEFA, #64B5E6);
  color: white;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 40px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 6px 24px rgba(135,206,250,0.4);
  transition: all 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(135,206,250,0.5); }
.btn:active { transform: translateY(0); }
.btn-small { padding: 12px 40px; font-size: 16px; }

/* 测试页 */
.quiz-page { display: none; }
.quiz-page.active { display: block; }

.progress-bar {
  width: 100%; height: 8px;
  background: #E0E0E0;
  border-radius: 4px;
  margin-bottom: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #87CEFA, #64B5E6);
  border-radius: 4px;
  transition: width 0.4s ease;
}
.progress-text {
  text-align: center;
  font-size: 14px;
  color: #6B8E9A;
  margin-bottom: 28px;
}

.question { margin-bottom: 26px; }
.question .q-num {
  display: inline-block;
  width: 36px; height: 36px;
  line-height: 36px;
  text-align: center;
  background: #87CEFA;
  color: white;
  border-radius: 50%;
  font-weight: bold;
  font-size: 16px;
  margin-right: 10px;
  vertical-align: middle;
}
.question h3 {
  display: inline;
  font-size: 20px;
  color: #2C5F6E;
  line-height: 1.5;
}

.options { margin-top: 18px; }
.option {
  display: block;
  width: 100%;
  padding: 18px 20px;
  margin-bottom: 12px;
  background: white;
  border: 2px solid #E8F4FD;
  border-radius: 16px;
  font-size: 16px;
  color: #3D5A6C;
  text-align: left;
  cursor: pointer;
  transition: all 0.3s;
}
.option:hover { border-color: #87CEFA; background: #F0F8FF; }
.option.selected {
  border-color: #87CEFA;
  background: #F0F8FF;
  box-shadow: 0 2px 12px rgba(135,206,250,0.2);
}
.option .opt-label {
  display: inline-block;
  width: 28px; height: 28px;
  line-height: 28px;
  text-align: center;
  background: #87CEFA;
  color: white;
  border-radius: 50%;
  font-weight: bold;
  font-size: 14px;
  margin-right: 12px;
}

/* 快速结果 */
.quick-result { display: none; text-align: center; padding-top: 30px; }
.quick-result.active { display: block; }
.quick-result .result-type { font-size: 52px; margin-bottom: 8px; }
.quick-result .result-name {
  font-size: 28px;
  font-weight: bold;
  color: #2C5F6E;
  margin-bottom: 10px;
}
.quick-result .result-desc {
  font-size: 15px;
  color: #6B8E9A;
  margin-bottom: 28px;
  line-height: 1.6;
}
.quick-result .result-chart {
  margin: 16px auto;
  max-width: 280px;
}
.quick-result .upgrade-box {
  background: white;
  border-radius: 20px;
  padding: 28px 20px;
  margin-top: 28px;
  box-shadow: 0 4px 20px rgba(135,206,250,0.1);
}
.quick-result .upgrade-box h4 {
  font-size: 20px;
  color: #2C5F6E;
  margin-bottom: 12px;
}
.quick-result .upgrade-box p {
  font-size: 14px;
  color: #6B8E9A;
  margin-bottom: 20px;
  line-height: 1.6;
}

/* 完整结果 */
.full-result { display: none; text-align: center; padding-top: 24px; }
.full-result.active { display: block; }
.full-result .result-type { font-size: 60px; margin-bottom: 8px; }
.full-result .result-name {
  font-size: 32px;
  font-weight: bold;
  color: #2C5F6E;
  margin-bottom: 8px;
}
.full-result .score {
  display: inline-block;
  padding: 8px 24px;
  background: #F0F8FF;
  border-radius: 20px;
  font-size: 16px;
  color: #5A8A9A;
  margin-bottom: 20px;
}
.full-result .result-desc {
  font-size: 15px;
  color: #3D5A6C;
  line-height: 1.8;
  text-align: left;
  margin-bottom: 20px;
  padding: 20px;
  background: white;
  border-radius: 16px;
}
.full-result .chart-box {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin: 20px 0;
  box-shadow: 0 4px 20px rgba(135,206,250,0.1);
}
.full-result .chart-box h4 {
  font-size: 18px;
  color: #2C5F6E;
  margin-bottom: 14px;
}
.full-result .radar-container {
  width: 280px; height: 280px;
  margin: 0 auto;
}
.full-result .action-plan {
  text-align: left;
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin: 20px 0;
}
.full-result .action-plan h4 {
  font-size: 18px;
  color: #2C5F6E;
  margin-bottom: 16px;
  text-align: center;
}
.full-result .action-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 12px 0;
  border-bottom: 1px solid #F0F8FF;
}
.full-result .action-item:last-child { border-bottom: none; }
.full-result .action-num {
  width: 28px; height: 28px;
  line-height: 28px;
  text-align: center;
  background: #87CEFA;
  color: white;
  border-radius: 50%;
  font-weight: bold;
  font-size: 14px;
  flex-shrink: 0;
}
.full-result .action-text {
  font-size: 14px;
  color: #3D5A6C;
  line-height: 1.6;
}
.full-result .path-box {
  text-align: left;
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin: 20px 0;
}
.full-result .path-box h4 {
  font-size: 18px;
  color: #2C5F6E;
  margin-bottom: 14px;
  text-align: center;
}
.hidden { display: none; }
</style>
</head>
<body>
<div class="container" id="app">

  <!-- 欢迎页 -->
  <div class="welcome" id="welcome">
    <div class="emoji-top">💼</div>
    <h1>你是否适合从商？</h1>
    <p class="subtitle">20题深度扫描你的商业潜能</p>
    <div class="dims">
      <div class="dim-item"><span class="dot"></span> 商业嗅觉 —— 你能发现别人看不到的机会吗？</div>
      <div class="dim-item"><span class="dot"></span> 风险偏好 —— 你敢冒多大的风险？</div>
      <div class="dim-item"><span class="dot"></span> 决策风格 —— 你是直觉派还是分析派？</div>
      <div class="dim-item"><span class="dot"></span> 人际手腕 —— 你擅长和人打交道吗？</div>
      <div class="dim-item"><span class="dot"></span> 金钱观 —— 钱对你意味着什么？</div>
    </div>
    <button class="btn" onclick="startQuiz()">开始测试</button>
  </div>

  <!-- 快速5题 -->
  <div class="quiz-page" id="quizPage">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">1/5</div>
    <div class="question"><span class="q-num" id="qNum">1</span><h3 id="qText"></h3></div>
    <div class="options" id="optionsBox"></div>
    <button class="btn btn-small hidden" id="nextBtn" onclick="nextQuestion()">下一题</button>
  </div>

  <!-- 快速结果 -->
  <div class="quick-result" id="quickResult">
    <div class="result-type" id="qrType"></div>
    <div class="result-name" id="qrName"></div>
    <div class="result-desc" id="qrDesc"></div>
    <div class="result-chart"><canvas id="quickRadar" width="260" height="260"></canvas></div>
    <div class="upgrade-box">
      <h4>🎯 以上只是5题快速版</h4>
      <p>完成全部20题，你将获得：<br>
      ✅ 精确的商业人格评分<br>
      ✅ 五维雷达图深度分析<br>
      ✅ 创业适配度诊断<br>
      ✅ 90天商业能力提升计划</p>
      <button class="btn" onclick="showFullQuiz()">解锁完整20题测试</button>
    </div>
  </div>

  <!-- 完整20题 -->
  <div class="quiz-page" id="fullQuizPage">
    <div class="progress-bar"><div class="progress-fill" id="fullProgressFill"></div></div>
    <div class="progress-text" id="fullProgressText">6/25</div>
    <div class="question"><span class="q-num" id="fullQNum">6</span><h3 id="fullQText"></h3></div>
    <div class="options" id="fullOptionsBox"></div>
    <button class="btn btn-small hidden" id="fullNextBtn" onclick="fullNextQuestion()">下一题</button>
  </div>

  <!-- 完整结果 -->
  <div class="full-result" id="fullResult"></div>

</div>

<script>
// ===== 数据 =====
const quickQuestions = [
  { q: "看到一个潜在的赚钱机会，你的第一反应是？",
    opts: ["马上研究可行性，准备行动", "先观望，看看别人做得怎么样", "分析风险和回报，做详细评估", "不太感兴趣，安稳上班就好"],
    scores: [4, 3, 2, 1] },
  { q: "如果创业失败一次，你会怎么做？",
    opts: ["总结经验，马上开始下一次尝试", "休息一段时间，再考虑是否继续", "分析失败原因，等时机成熟再试", "算了，创业不适合我，回去上班"],
    scores: [4, 3, 2, 1] },
  { q: "对于「高风险高回报」这句话，你的态度是？",
    opts: ["认同，不冒险怎么赚大钱", "可以接受可控风险，但不能all in", "更倾向于低风险稳定收益", "风险越低越好，安全第一"],
    scores: [4, 3, 2, 1] },
  { q: "在团队中，你更习惯扮演什么角色？",
    opts: ["拍板决策的那个人", "出谋划策的军师", "协调沟通的桥梁", "踏实执行的骨干"],
    scores: [4, 3, 2, 1] },
  { q: "你对金钱的态度最接近？",
    opts: ["钱是实现目标的工具，越多越好", "钱是安全感的来源，够用就行", "钱是自由的保障，追求财务自由", "钱够花就好，不把它看得太重"],
    scores: [4, 2, 3, 1] }
];

const fullQuestions = [
  // 维度1: 商业嗅觉 (6-9)
  { q: "你逛街/刷淘宝时，会不自觉地分析别人的商业模式吗？", opts: ["经常，看到就想这个店怎么赚钱", "偶尔会，感兴趣的就分析一下", "很少，买东西就是买东西", "完全不会"], scores: [4, 3, 2, 1] },
  { q: "朋友向你抱怨某个产品不好用时，你的反应？", opts: ["心想如果有更好的产品就能抓住机会", "帮他想办法，但不会往商业上想", "一起吐槽，仅此而已", "不太关心"], scores: [4, 3, 2, 1] },
  { q: "你是否关注行业新闻和市场趋势？", opts: ["每天必看，这是我的信息来源", "偶尔会看，保持敏感度", "只在需要时才会关注", "几乎不看，不感兴趣"], scores: [4, 3, 2, 1] },
  { q: "你对新兴行业（如AI、Web3等）的态度？", opts: ["非常感兴趣，已经在研究或参与", "有兴趣但还没深入", "知道但不太关注", "不关心，离我太远"], scores: [4, 3, 2, 1] },

  // 维度2: 风险偏好 (10-13)
  { q: "你有一笔闲钱，更倾向于怎么处理？", opts: ["投资/创业，让钱生钱", "部分理财+部分存款", "大部分存起来", "全部存银行最安全"], scores: [4, 3, 2, 1] },
  { q: "公司新开一个业务线，老板问谁愿意牵头，你？", opts: ["主动请缨，机会难得", "如果条件合适就试试", "等别人先去，看看情况", "不主动，不想担风险"], scores: [4, 3, 2, 1] },
  { q: "你如何看待「失败」？", opts: ["失败是成功的必经之路", "失败很痛但能学到东西", "失败让我很难受，需要时间恢复", "尽量避免失败，求稳"], scores: [4, 3, 2, 1] },
  { q: "做重要决定时，你通常？", opts: ["收集关键信息后快速拍板", "做足功课再决定", "找人商量后再定", "能拖就拖，不做决定"], scores: [4, 3, 2, 1] },

  // 维度3: 决策风格 (14-17)
  { q: "面对两个都不错的方案，你怎么选？", opts: ["凭直觉和经验快速选", "列出优缺点比较后选", "问更多人意见再选", "很难选，会纠结很久"], scores: [4, 3, 2, 1] },
  { q: "你对数据的依赖程度？", opts: ["数据重要，但直觉也关键", "必须有足够数据支撑才决策", "主要靠经验判断", "不太会用数据，凭感觉"], scores: [3, 2, 4, 1] },
  { q: "发现之前的决策是错的，你会？", opts: ["立刻承认并调整方向", "分析原因后逐步修正", "有点懊恼但会继续观察", "坚持到底，不愿承认错误"], scores: [4, 3, 2, 1] },
  { q: "时间紧迫时做决策，你的状态？", opts: ["反而更果断，效率高", "有点紧张但能应对", "需要强迫自己做决定", "容易慌乱，做不出决定"], scores: [4, 3, 2, 1] },

  // 维度4: 人际手腕 (18-21)
  { q: "和陌生人建立关系，你觉得？", opts: ["很自然，这是我的强项", "需要一点时间但问题不大", "有点不自在但会努力", "非常困难，能避则避"], scores: [4, 3, 2, 1] },
  { q: "谈判/讨价还价时，你通常？", opts: ["享受这个过程，争取最大利益", "该争取的会争取", "不太好意思，差不多就行", "直接接受，不愿讨价还价"], scores: [4, 3, 2, 1] },
  { q: "你对「人脉就是钱脉」的看法？", opts: ["完全认同，一直在经营人脉", "有一定道理，但能力更重要", "不太认同，靠实力说话", "不认同，不想搞关系"], scores: [4, 3, 2, 1] },
  { q: "团队里有不同意见时，你怎么处理？", opts: ["引导大家达成共识，推动决策", "倾听各方意见，协调平衡", "让更有经验的人决定", "避开冲突，不参与"], scores: [4, 3, 2, 1] },

  // 维度5: 金钱观 (22-25)
  { q: "如果突然获得100万，你会？", opts: ["部分投资创业+部分理财", "买房/还贷+部分储蓄", "大部分存起来慢慢用", "好好享受，该花就花"], scores: [4, 3, 2, 1] },
  { q: "你对「财务自由」的定义？", opts: ["有足够的资本持续创造财富", "被动收入覆盖日常开销", "有房有车无贷款", "不愁吃穿就行"], scores: [4, 3, 2, 1] },
  { q: "看到朋友靠副业/创业赚了钱，你的反应？", opts: ["受激励，我也要试试", "为他高兴，自己也会想想", "羡慕但不知道怎么开始", "不羡慕，安稳就好"], scores: [4, 3, 2, 1] },
  { q: "你认为赚钱最重要的是？", opts: ["眼光和执行力", "资源和平台", "勤奋和积累", "运气和时机"], scores: [4, 3, 2, 1] }
];

const results = [
  { type: "💼", name: "天生商人型", desc: "你具备优秀商人的核心特质：商业嗅觉敏锐、敢于冒险、决策果断、擅长人际。从商对你来说不是选择，而是一种本能的召唤。你适合创业或担任商业核心角色。", scoreLabel: "商业适配度", scoreRange: "80-100", scoreDesc: "高度适配商业领域" },
  { type: "📋", name: "稳健管理型", desc: "你有商业头脑但更注重风险控制。你的优势在于精打细算、稳中求进——也许不适合激进创业，但在成熟企业中做管理或财务相关岗位会非常出色。", scoreLabel: "商业适配度", scoreRange: "50-70", scoreDesc: "适合管理型商业角色" },
  { type: "🤝", name: "关系驱动型", desc: "你最大的商业优势是人脉和关系经营能力。你可能不擅长独自冲锋陷阵，但在合作、销售、客户关系等领域是你的主场。你的商业成功路径是「合作共赢」。", scoreLabel: "商业适配度", scoreRange: "40-60", scoreDesc: "适合关系型商业角色" },
  { type: "🌿", name: "观望探索型", desc: "目前你可能还没有强烈的从商意愿，或者还在探索自己是否适合。这不代表你不能从商——很多人是在积累了足够经验和信心后才走上商业之路的。", scoreLabel: "商业适配度", scoreRange: "0-35", scoreDesc: "仍在探索商业方向" }
];

const dimNames = ["商业嗅觉", "风险偏好", "决策风格", "人际手腕", "金钱观"];

// ===== 状态 =====
let quickAnswers = [], quickCurrent = 0;
let fullAnswers = [], fullCurrent = 0;

function startQuiz() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('quizPage').classList.add('active');
  document.getElementById('quizPage').style.display = 'block';
  quickCurrent = 0; quickAnswers = [];
  showQuickQuestion();
}

function showQuickQuestion() {
  if (quickCurrent >= 5) { showQuickResult(); return; }
  const q = quickQuestions[quickCurrent];
  document.getElementById('qNum').textContent = quickCurrent + 1;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = (quickCurrent / 5 * 100) + '%';
  document.getElementById('progressText').textContent = (quickCurrent + 1) + '/5';
  let html = '';
  q.opts.forEach((opt, i) => {
    const sel = quickAnswers[quickCurrent] === i ? ' selected' : '';
    html += `<button class="option${sel}" onclick="selectQuick(${i})"><span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}</button>`;
  });
  document.getElementById('optionsBox').innerHTML = html;
  document.getElementById('nextBtn').classList.add('hidden');
}

function selectQuick(idx) {
  quickAnswers[quickCurrent] = idx;
  document.querySelectorAll('.option').forEach((el, i) => el.classList.toggle('selected', i === idx));
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextQuestion() { quickCurrent++; showQuickQuestion(); }

function showQuickResult() {
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('quizPage').classList.remove('active');
  document.getElementById('quickResult').classList.add('active');
  document.getElementById('quickResult').style.display = 'block';
  let total = 0;
  quickAnswers.forEach((a, i) => { total += quickQuestions[i].scores[a]; });
  let score = Math.round((total - 5) / (20 - 5) * 100);
  score = Math.max(0, Math.min(100, score));
  let ri = score >= 70 ? 0 : score <= 35 ? 3 : score >= 50 ? 1 : 2;
  const r = results[ri];
  document.getElementById('qrType').textContent = r.type;
  document.getElementById('qrName').textContent = r.name;
  document.getElementById('qrDesc').textContent = r.desc;
  setTimeout(() => drawRadar('quickRadar', [65, 55, 70, 60, 50]), 200);
}

function showFullQuiz() {
  document.getElementById('quickResult').style.display = 'none';
  document.getElementById('quickResult').classList.remove('active');
  document.getElementById('fullQuizPage').classList.add('active');
  document.getElementById('fullQuizPage').style.display = 'block';
  fullCurrent = 0; fullAnswers = [];
  showFullQuestion();
}

function showFullQuestion() {
  if (fullCurrent >= 20) { showFullResult(); return; }
  const q = fullQuestions[fullCurrent];
  document.getElementById('fullQNum').textContent = fullCurrent + 6;
  document.getElementById('fullQText').textContent = q.q;
  document.getElementById('fullProgressFill').style.width = ((fullCurrent + 5) / 25 * 100) + '%';
  document.getElementById('fullProgressText').textContent = (fullCurrent + 6) + '/25';
  let html = '';
  q.opts.forEach((opt, i) => {
    const sel = fullAnswers[fullCurrent] === i ? ' selected' : '';
    html += `<button class="option${sel}" onclick="selectFull(${i})"><span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}</button>`;
  });
  document.getElementById('fullOptionsBox').innerHTML = html;
  document.getElementById('fullNextBtn').classList.add('hidden');
}

function selectFull(idx) {
  fullAnswers[fullCurrent] = idx;
  document.querySelectorAll('#fullOptionsBox .option').forEach((el, i) => el.classList.toggle('selected', i === idx));
  document.getElementById('fullNextBtn').classList.remove('hidden');
}

function fullNextQuestion() { fullCurrent++; showFullQuestion(); }

function showFullResult() {
  document.getElementById('fullQuizPage').style.display = 'none';
  document.getElementById('fullQuizPage').classList.remove('active');

  let dimScores = [0,0,0,0,0];
  fullAnswers.forEach((a, i) => { dimScores[Math.floor(i/4)] += fullQuestions[i].scores[a]; });
  let dimNorm = dimScores.map(s => Math.round(s / 16 * 100));
  let totalScore = dimScores.reduce((a,b) => a+b, 0);
  let finalScore = Math.round(totalScore / 80 * 100);
  finalScore = Math.max(0, Math.min(100, finalScore));

  let ri = finalScore >= 70 ? 0 : finalScore <= 35 ? 3 : finalScore >= 50 ? 1 : 2;
  const r = results[ri];

  let pathText;
  if (ri === 0) pathText = "💼 天生商人型 → 持续进化：你已经有了从商的核心特质，下一步是深耕行业、建立团队、放大商业版图。";
  else if (ri === 1) pathText = "📋 稳健管理型 → 找到赛道：你的优势在管理和风控，适合在成熟平台或合伙创业中发挥商业才能。";
  else if (ri === 2) pathText = "🤝 关系驱动型 → 借力成长：你的人脉是最大资产，从合作/代理/渠道切入商业是最佳路径。";
  else pathText = "🌿 观望探索型 → 积累突破：先在一个行业深耕积累经验，商业机会会随着你的积累自然出现。";

  const actions = [
    ["第1-30天：认知升级", "每天阅读商业案例30分钟，关注3个行业KOL，建立商业信息流"],
    ["第31-60天：小步试错", "尝试一个低成本的商业实践（如闲鱼卖货、知识付费、社群运营等）"],
    ["第61-90天：复盘迭代", "分析试错结果，明确自己的商业优势和短板，制定下一步计划"]
  ];

  let html = `
    <div class="result-type">${r.type}</div>
    <div class="result-name">${r.name}</div>
    <div class="score">${r.scoreLabel}：${finalScore}分 · ${r.scoreDesc}</div>
    <div class="result-desc">${r.desc}</div>
    <div class="chart-box">
      <h4>📊 五维雷达图分析</h4>
      <div class="radar-container"><canvas id="fullRadar" width="280" height="280"></canvas></div>
    </div>
    <div class="path-box">
      <h4>🛤️ 你的商业成长路径</h4>
      <p style="font-size:14px;color:#3D5A6C;line-height:1.8;">${pathText}</p>
    </div>
    <div class="action-plan">
      <h4>📋 90天商业能力提升计划</h4>
      ${actions.map((a, i) => `
        <div class="action-item">
          <div class="action-num">${i+1}</div>
          <div class="action-text"><strong>${a[0]}</strong><br>${a[1]}</div>
        </div>`).join('')}
    </div>
    <p style="font-size:13px;color:#6B8E9A;margin-top:16px;">💡 测试结果仅供参考，商业成功=天赋+努力+机遇<br>每个人都可以通过学习和实践提升商业能力</p>
  `;

  document.getElementById('fullResult').innerHTML = html;
  document.getElementById('fullResult').classList.add('active');
  document.getElementById('fullResult').style.display = 'block';
  setTimeout(() => drawRadar('fullRadar', dimNorm), 300);
}

// ===== 雷达图 =====
function drawRadar(cid, data) {
  const c = document.getElementById(cid);
  if (!c) return;
  const ctx = c.getContext('2d');
  const cx = c.width/2, cy = c.height/2, r = 100, sides = 5;
  ctx.clearRect(0, 0, c.width, c.height);
  for (let lv = 1; lv <= 5; lv++) {
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const a = (Math.PI*2/sides)*i - Math.PI/2;
      const rr = (r/5)*lv;
      const x = cx + rr*Math.cos(a), y = cy + rr*Math.sin(a);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = '#E0E0E0'; ctx.lineWidth = 1; ctx.stroke();
  }
  for (let i = 0; i < sides; i++) {
    const a = (Math.PI*2/sides)*i - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r*Math.cos(a), cy + r*Math.sin(a));
    ctx.strokeStyle = '#E0E0E0'; ctx.stroke();
  }
  ctx.beginPath();
  for (let i = 0; i < sides; i++) {
    const a = (Math.PI*2/sides)*i - Math.PI/2;
    const rr = (data[i]/100)*r;
    const x = cx + rr*Math.cos(a), y = cy + rr*Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(135,206,250,0.3)'; ctx.fill();
  ctx.strokeStyle = '#87CEFA'; ctx.lineWidth = 2; ctx.stroke();
  for (let i = 0; i < sides; i++) {
    const a = (Math.PI*2/sides)*i - Math.PI/2;
    const rr = (data[i]/100)*r;
    const x = cx + rr*Math.cos(a), y = cy + rr*Math.sin(a);
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fillStyle = '#64B5E6'; ctx.fill();
  }
  ctx.fillStyle = '#3D5A6C'; ctx.font = '12px -apple-system, sans-serif'; ctx.textAlign = 'center';
  for (let i = 0; i < sides; i++) {
    const a = (Math.PI*2/sides)*i - Math.PI/2;
    ctx.fillText(dimNames[i], cx + (r+25)*Math.cos(a), cy + (r+25)*Math.sin(a) + 4);
  }
}
