</div>

  <div class="card">

  <div class="card" style="text-align:center">
    <button class="btn btn-primary" onclick="restartTest()">🔄 重新测试</button>
    <button class="btn btn-share" onclick="shareResult()">📤 分享结果</button>
  </div>
</div>

    pathB: { title: "深度精进", desc: "在保持和平的同时，练习更勇敢地表达自己的边界和需求，不因「和平」而妥协。" },
    actions: ["第1-14天：复盘你的沟通优势——是什么让你能做到健康表达？", "第15-30天：检查是否有「为了和平而委屈自己」的情况，有的话练习更坚定", "第31-60天：帮助一个朋友改善他的沟通模式，分享你的经验", "第61-90天：在现有基础上尝试一次「深度沟通」——分享一个你以前不敢说的感受"]
  }
};

let currentQuestion = 0, answers = [], scores = { "冲突应对": 0, "情绪表达": 0, "报复倾向": 0, "控制方式": 0, "自我觉察": 0 };

function startTest() {
  document.getElementById('welcome-page').classList.add('hidden');
  document.getElementById('question-page').classList.remove('hidden');
  document.getElementById('question-page').classList.add('fade-in');
  currentQuestion = 0; answers = [];
  scores = { "冲突应对": 0, "情绪表达": 0, "报复倾向": 0, "控制方式": 0, "自我觉察": 0 };
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  document.getElementById('progress-text').textContent = `第 ${currentQuestion + 1}/20 题`;
  document.getElementById('progress-fill').style.width = `${(currentQuestion + 1) / 20 * 100}%`;
  document.getElementById('category-tag').textContent = q.category;
  document.getElementById('question-text').textContent = q.text;
  const ol = document.getElementById('option-list');
  ol.innerHTML = '';
  ['A','B','C','D'].forEach((lbl, i) => {
    const li = document.createElement('li');
    li.className = 'option-item';
    li.innerHTML = `<span class="option-label">${lbl}.</span> ${q.options[i]}`;
    li.onclick = () => selectOption(i, li);
    ol.appendChild(li);
  });
  document.getElementById('next-btn').disabled = true;
  document.getElementById('next-btn').textContent = currentQuestion < 19 ? '下一题 →' : '查看结果 ✨';
}

function selectOption(index, element) {
  document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
  element.classList.add('selected');
  document.getElementById('next-btn').disabled = false;
  element.dataset.selectedIndex = index;
}

function nextQuestion() {
  const sel = document.querySelector('.option-item.selected');
  if (!sel) return;
  const idx = parseInt(sel.dataset.selectedIndex);
  answers.push(idx);
  const q = questions[currentQuestion];
  // A=直接/高攻击(4), B=冷暴力(3), C=被动攻击(3), D=和平(1)
  const sm = { 0: 4, 1: 3, 2: 3, 3: 1 };
  scores[q.category] += sm[idx];
  currentQuestion++;
  if (currentQuestion < 20) { showQuestion(); document.getElementById('question-page').classList.remove('fade-in'); void document.getElementById('question-page').offsetWidth; document.getElementById('question-page').classList.add('fade-in'); }
  else showResult();
}

function showResult() {
  document.getElementById('question-page').classList.add('hidden');
  document.getElementById('result-page').classList.remove('hidden');
  document.getElementById('result-page').classList.add('fade-in');
  const total = Object.values(scores).reduce((a,b)=>a+b,0);
  const pct = Math.round(total / 80 * 100);
  let rk;
  if (pct >= 70) rk = 'direct';
  else if (pct >= 50) rk = 'passive';
  else if (pct >= 30) rk = 'cold';
  else rk = 'peace';
  const r = resultTypes[rk];
  document.getElementById('result-icon').textContent = r.icon;
  document.getElementById('result-name').textContent = r.name;
  document.getElementById('result-desc').textContent = r.desc;
  document.getElementById('score-number').textContent = pct + '%';
  document.getElementById('score-bar-fill').style.width = pct + '%';
  const hints = { direct: '偏高——你的攻击力是显性的，学会缓冲', cold: '中等偏低——你倾向于用沉默表达，学会在冷静中保持连接', passive: '中等——你的攻击力最隐形，学会直接表达', peace: '低——你几乎不用攻击，保持和平也要照顾自己的需求' };
  document.getElementById('score-hint').textContent = hints[rk];
  document.getElementById('interpret-core').textContent = r.core;
  document.getElementById('interpret-mechanism').textContent = r.mechanism;
  document.getElementById('path-a-title').textContent = r.pathA.title;
  document.getElementById('path-a-desc').textContent = r.pathA.desc;
  document.getElementById('path-b-title').textContent = r.pathB.title;
  document.getElementById('path-b-desc').textContent = r.pathB.desc;
  document.getElementById('action-steps').innerHTML = r.actions.map((a,i)=>`<div class="action-step"><span class="step-num">${i+1}</span>${a}</div>`).join('');
  drawRadar();
}

function drawRadar() {
  const c = document.getElementById('radar-chart');
  const dims = ["冲突应对","情绪表达","报复倾向","控制方式","自我觉察"];
  const maxD = 16, cx = 125, cy = 125, R = 100;
  let s = `<svg class="radar-svg" viewBox="0 0 250 250">`;
  for (let lv=1; lv<=4; lv++) {
    let pts = []; for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const r = R*lv/4; pts.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`); }
    s += `<polygon points="${pts.join(' ')}" fill="none" stroke="#D7D4D0" stroke-width="1" opacity="0.6"/>`;
  }
  for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; s += `<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(a)}" y2="${cy+R*Math.sin(a)}" stroke="#D7D4D0" stroke-width="1"/>`; }
  let dp = []; for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const r = R*Math.min(scores[dims[i]]/maxD,1); dp.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`); }
  s += `<polygon points="${dp.join(' ')}" fill="rgba(200,195,188,0.25)" stroke="#C8C3BC" stroke-width="2.5"/>`;
  for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const r = R*Math.min(scores[dims[i]]/maxD,1); s += `<circle cx="${cx+r*Math.cos(a)}" cy="${cy+r*Math.sin(a)}" r="5" fill="#B9B7B2"/>`; }
  for (let i=0; i<5; i++) { const a = Math.PI*2*i/5 - Math.PI/2; const lr = R+24; const x = cx+lr*Math.cos(a); const y = cy+lr*Math.sin(a); const anc = Math.abs(x-cx)<15?'middle':(x<cx?'end':'start'); s += `<text x="${x}" y="${y}" text-anchor="${anc}" dominant-baseline="middle" font-size="11" fill="#73706C">${dims[i]}</text>`; }
  s += '</svg>'; c.innerHTML = s;
}

function restartTest() { document.getElementById('result-page').classList.add('hidden'); document.getElementById('welcome-page').classList.remove('hidden'); currentQuestion=0; answers=[]; scores={"冲突应对":0,"情绪表达":0,"报复倾向":0,"控制方式":0,"自我觉察":0}; }

function shareResult() {
  const n = document.getElementById('result-name').textContent, d = document.getElementById('result-desc').textContent;
  const t = `测了「你的隐形攻击力」：${n} - ${d}`;
  navigator.share ? navigator.share({title:'你的隐形攻击力',text:t}) : (navigator.clipboard.writeText(t), alert('结果已复制！'));
}
</script>
